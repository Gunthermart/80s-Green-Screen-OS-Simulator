<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikhaïl Botvinnik - Chess Master</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/assets/chessboard.css">

    <style>
        body {
            background-color: #111827; /* bg-gray-900 pour un look plus premium */
            color: #f3f4f6;
            overscroll-behavior-y: none;
        }
        #main-board-area {
            width: 100%;
        }
        .board {
            width: 100%;
            aspect-ratio: 1 / 1;
            touch-action: none;
        }
        .clock-active {
            background-color: #4b5563 !important; /* bg-gray-600 */
            border-color: #9ca3af !important; /* border-gray-400 */
            color: #f9fafb !important;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-2 sm:py-8 px-2 sm:px-4">

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-[100] transition-opacity duration-500">
        <h1 class="text-4xl sm:text-6xl md:text-7xl font-serif text-white mb-2 tracking-wider text-center px-4">Mikhaïl Botvinnik</h1>
        <p class="text-lg sm:text-xl md:text-2xl text-gray-400 font-light tracking-[0.3em] uppercase mb-8 text-center">Chess Master</p>
        
        <select id="lang-select" class="mb-8 bg-gray-800 text-gray-300 border border-gray-600 rounded px-4 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500">
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="de">Deutsch</option>
        </select>

        <button id="enter-game-btn" class="px-10 py-3 bg-white text-gray-900 font-bold tracking-wide rounded hover:bg-gray-200 transition opacity-0 transform translate-y-4 duration-700 ease-out">
            ENTRER
        </button>
    </div>

    <!-- Interface Principale -->
    <div class="w-full max-w-6xl flex flex-col lg:flex-row gap-4 sm:gap-6 opacity-0 transition-opacity duration-700" id="main-interface" style="display: none;">
        
        <!-- Zone de Jeu (Gauche) -->
        <div class="flex-1 flex flex-col items-center w-full justify-center">
            
            <div id="status-bar" class="w-full mb-2 text-center font-semibold text-sm sm:text-lg h-6 sm:h-8 text-gray-300">
                Préparation de l'échiquier...
            </div>

            <div class="w-full max-w-[650px] flex flex-col mx-auto">
                <div class="flex justify-between items-center mb-1 sm:mb-2 px-1">
                    <span id="label-computer" class="font-bold text-xs sm:text-sm text-gray-400">Ordinateur</span>
                    <span id="top-clock" class="font-mono font-bold text-sm sm:text-lg bg-gray-800 border border-gray-700 text-gray-300 rounded px-2 sm:px-3 py-1 transition-colors">--:--</span>
                </div>

                <div id="main-board-area" class="flex gap-1 sm:gap-2">
                    <div id="eval-bar" class="w-4 sm:w-6 md:w-8 bg-gray-800 rounded flex flex-col-reverse overflow-hidden relative border border-gray-700 shrink-0">
                        <div id="eval-fill" class="bg-gray-300 w-full transition-all duration-300 ease-out" style="height: 50%;"></div>
                        <span id="eval-text" class="absolute inset-0 flex items-center justify-center text-[8px] sm:text-[10px] md:text-xs font-bold text-gray-900 z-10 pointer-events-none mix-blend-difference">0.0</span>
                    </div>
                    <div id="board" class="board flex-1 shadow-2xl rounded"></div>
                </div>

                <div class="flex justify-between items-center mt-1 sm:mt-2 px-1">
                    <span id="label-you" class="font-bold text-xs sm:text-sm text-gray-400">Vous</span>
                    <span id="bottom-clock" class="font-mono font-bold text-sm sm:text-lg bg-gray-800 border border-gray-700 text-gray-300 rounded px-2 sm:px-3 py-1 transition-colors">--:--</span>
                </div>
            </div>
            
            <div id="engine-status" class="mt-2 text-xs sm:text-sm text-gray-500 text-center hidden">
                L'ordinateur réfléchit...
            </div>
        </div>

        <!-- Panneau de Contrôle (Droite) -->
        <div class="w-full lg:w-80 shrink-0 relative">
            <div class="w-full h-full lg:absolute lg:inset-0 flex flex-col bg-gray-800 border border-gray-700 rounded-lg p-3 sm:p-4 gap-4 sm:gap-6 shadow-xl">
                
                <!-- Contrôles -->
                <div class="flex flex-col gap-3 shrink-0">
                    <button id="reset-btn" class="w-full bg-blue-600 text-white px-4 py-3 rounded font-bold hover:bg-blue-700 transition shadow-lg uppercase tracking-wide text-sm">
                        Nouvelle Partie
                    </button>
                    
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div class="flex flex-col gap-1">
                            <label id="label-color" class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold px-1">Couleur</label>
                            <select id="player-color" class="w-full bg-gray-700 border-none text-white text-sm rounded focus:ring-1 focus:ring-blue-500 block p-2">
                                <option value="w" selected>Blancs</option>
                                <option value="b">Noirs</option>
                                <option value="auto">Auto (IA vs IA)</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label id="label-level" class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold px-1">Niveau</label>
                            <select id="difficulty" class="w-full bg-gray-700 border-none text-white text-sm rounded focus:ring-1 focus:ring-blue-500 block p-2">
                                <option value="0">Débutant</option>
                                <option value="1" selected>Facile</option>
                                <option value="2">Moyen</option>
                                <option value="3">Difficile</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1">
                            <label id="label-time" class="text-[10px] uppercase tracking-wider text-gray-400 font-semibold px-1">Cadence</label>
                            <select id="time-control" class="w-full bg-gray-700 border-none text-white text-sm rounded focus:ring-1 focus:ring-blue-500 block p-2">
                                <option value="0" selected>Infini</option>
                                <option value="3">3 min</option>
                                <option value="5">5 min</option>
                                <option value="10">10 min</option>
                            </select>
                        </div>
                        <div class="flex flex-col justify-end">
                            <button id="sound-btn" class="w-full bg-gray-700 text-white px-2 py-2 rounded text-sm hover:bg-gray-600 transition h-[36px]">

                </div>

                <!-- Historique -->

                    <h2 id="label-history" class="text-sm font-bold mb-2 border-b border-gray-700 pb-2 text-gray-300 uppercase tracking-wider shrink-0">Historique</h2>

                        <!-- Injections JS -->
                    </div>
                    <button id="copy-pgn-btn" class="w-full bg-gray-700 text-white px-4 py-2 rounded font-medium hover:bg-gray-600 transition text-sm shrink-0">
                        Copier PGN

                </div>
            </div>
        </div>

    </div>

    <!-- Modale de promotion -->
    <div id="promotion-modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 flex items-center justify-center z-50 hidden backdrop-blur-sm">
        <div class="bg-gray-800 p-4 sm:p-6 rounded-lg shadow-2xl text-center w-11/12 max-w-sm border border-gray-700">
            <h2 id="label-promotion" class="text-lg sm:text-xl font-bold mb-4 text-white">Promotion</h2>
            <div class="flex gap-2 sm:gap-4 justify-center">
                <button class="promo-btn text-4xl sm:text-5xl p-2 sm:p-3 bg-gray-700 text-white hover:bg-gray-600 rounded border border-gray-600 transition cursor-pointer flex-1" data-piece="q">♕</button>
                <button class="promo-btn text-4xl sm:text-5xl p-2 sm:p-3 bg-gray-700 text-white hover:bg-gray-600 rounded border border-gray-600 transition cursor-pointer flex-1" data-piece="r">♖</button>
                <button class="promo-btn text-4xl sm:text-5xl p-2 sm:p-3 bg-gray-700 text-white hover:bg-gray-600 rounded border border-gray-600 transition cursor-pointer flex-1" data-piece="b">♗</button>
                <button class="promo-btn text-4xl sm:text-5xl p-2 sm:p-3 bg-gray-700 text-white hover:bg-gray-600 rounded border border-gray-600 transition cursor-pointer flex-1" data-piece="n">♘</button>
            </div>
        </div>
    </div>

    <script type="module">
        import {Chessboard, INPUT_EVENT_TYPE, COLOR} from "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/src/Chessboard.js";
        import {MARKER_TYPE, Markers} from "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/src/extensions/markers/Markers.js";
        import {Chess} from "https://esm.sh/chess.js@1.0.0-beta.8";

        // --- DICTIONNAIRE I18N ---
        const dict = {
            fr: { enter: "ENTRER", prep: "Préparation de l'échiquier...", comp: "Ordinateur", you: "Vous", think: "L'ordinateur réfléchit...", new: "Nouvelle Partie", col: "Couleur", white: "Blancs", black: "Noirs", auto: "Auto (IA vs IA)", lvl: "Niveau", beg: "Débutant", easy: "Facile", med: "Moyen", hard: "Difficile", time: "Cadence", inf: "Infini", min: "min", sonOn: "Son: ON", sonOff: "Son: OFF", hist: "Historique", copy: "Copier PGN", promo: "Promotion", check: "Échec.", mateWin: "Échec et mat. Vous avez gagné.", mateLose: "Échec et mat. L'ordinateur a gagné.", mateAuto: "Échec et mat.", draw: "Partie nulle.", timeWin: "Défaite au temps. Vous avez gagné.", timeLose: "Défaite au temps. L'ordinateur a gagné.", timeAuto: "Défaite au temps.", turnYou: "À vous de jouer", turnComp: "Au tour de l'ordinateur", turnAuto: "IA en cours...", copied: "Copié !" },
            en: { enter: "ENTER", prep: "Preparing board...", comp: "Computer", you: "You", think: "Computer is thinking...", new: "New Game", col: "Color", white: "White", black: "Black", auto: "Auto (AI vs AI)", lvl: "Level", beg: "Beginner", easy: "Easy", med: "Medium", hard: "Hard", time: "Time", inf: "Infinite", min: "min", sonOn: "Sound: ON", sonOff: "Sound: OFF", hist: "History", copy: "Copy PGN", promo: "Promotion", check: "Check.", mateWin: "Checkmate. You won.", mateLose: "Checkmate. Computer won.", mateAuto: "Checkmate.", draw: "Draw.", timeWin: "Time out. You won.", timeLose: "Time out. Computer won.", timeAuto: "Time out.", turnYou: "Your turn", turnComp: "Computer's turn", turnAuto: "AI playing...", copied: "Copied!" },
            es: { enter: "ENTRAR", prep: "Preparando tablero...", comp: "Ordenador", you: "Tú", think: "El ordenador piensa...", new: "Nueva Partida", col: "Color", white: "Blancas", black: "Negras", auto: "Auto (IA vs IA)", lvl: "Nivel", beg: "Principiante", easy: "Fácil", med: "Medio", hard: "Difícil", time: "Tiempo", inf: "Infinito", min: "min", sonOn: "Sonido: ON", sonOff: "Sonido: OFF", hist: "Historial", copy: "Copiar PGN", promo: "Promoción", check: "Jaque.", mateWin: "Jaque mate. Has ganado.", mateLose: "Jaque mate. El ordenador gana.", mateAuto: "Jaque mate.", draw: "Empate.", timeWin: "Tiempo agotado. Has ganado.", timeLose: "Tiempo agotado. El ordenador gana.", timeAuto: "Tiempo agotado.", turnYou: "Tu turno", turnComp: "Turno del ordenador", turnAuto: "IA jugando...", copied: "¡Copiado!" },
            de: { enter: "START", prep: "Brett wird vorbereitet...", comp: "Computer", you: "Du", think: "Computer denkt nach...", new: "Neues Spiel", col: "Farbe", white: "Weiß", black: "Schwarz", auto: "Auto (KI vs KI)", lvl: "Stufe", beg: "Anfänger", easy: "Leicht", med: "Mittel", hard: "Schwer", time: "Zeit", inf: "Unendlich", min: "min", sonOn: "Ton: AN", sonOff: "Ton: AUS", hist: "Verlauf", copy: "PGN kopieren", promo: "Umwandlung", check: "Schach.", mateWin: "Schachmatt. Du gewinnst.", mateLose: "Schachmatt. Computer gewinnt.", mateAuto: "Schachmatt.", draw: "Unentschieden.", timeWin: "Zeit abgelaufen. Du gewinnst.", timeLose: "Zeit abgelaufen. Computer gewinnt.", timeAuto: "Zeit abgelaufen.", turnYou: "Du bist dran", turnComp: "Computer ist dran", turnAuto: "KI spielt...", copied: "Kopiert!" }
        };
        let currentLang = localStorage.getItem('chess_lang') || 'fr';

        function applyTranslation() {
            const t = dict[currentLang];
            document.getElementById('enter-game-btn').textContent = t.enter;
            document.getElementById('label-computer').textContent = t.comp;
            document.getElementById('label-you').textContent = t.you;
            document.getElementById('engine-status').textContent = t.think;
            document.getElementById('reset-btn').textContent = t.new;
            document.getElementById('label-color').textContent = t.col;
            document.getElementById('label-level').textContent = t.lvl;
            document.getElementById('label-time').textContent = t.time;
            document.getElementById('label-history').textContent = t.hist;
            document.getElementById('copy-pgn-btn').textContent = t.copy;
            document.getElementById('label-promotion').textContent = t.promo;
            
            const colorOpts = document.getElementById('player-color').options;
            colorOpts[0].text = t.white; colorOpts[1].text = t.black; colorOpts[2].text = t.auto;
            
            const diffOpts = document.getElementById('difficulty').options;
            diffOpts[0].text = t.beg; diffOpts[1].text = t.easy; diffOpts[2].text = t.med; diffOpts[3].text = t.hard;
            
            const timeOpts = document.getElementById('time-control').options;
            timeOpts[0].text = t.inf; timeOpts[1].text = "3 " + t.min; timeOpts[2].text = "5 " + t.min; timeOpts[3].text = "10 " + t.min;
        }

        // --- SPLASH SCREEN LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('enter-game-btn');
            const splash = document.getElementById('splash-screen');
            const mainUI = document.getElementById('main-interface');
            const langSelect = document.getElementById('lang-select');

            langSelect.value = currentLang;
            applyTranslation();

            langSelect.addEventListener('change', (e) => {
                currentLang = e.target.value;
                localStorage.setItem('chess_lang', currentLang);
                applyTranslation();
                
                // Force la mise à jour des textes dynamiques gérés par le moteur de jeu
                if (typeof game !== 'undefined') {
                    game.updateGameState();
                    game.ui.setSoundUI(game.isMuted);
                }
            });
            
            // Animation d'entrée du bouton
            setTimeout(() => {
                btn.classList.remove('opacity-0', 'translate-y-4');
            }, 800);

            btn.addEventListener('click', () => {
                splash.classList.add('opacity-0');
                setTimeout(() => {
                    splash.style.display = 'none';
                    mainUI.style.display = 'flex';
                    // Petit délai pour assurer que le display flex est appliqué avant l'opacité
                    setTimeout(() => mainUI.classList.remove('opacity-0'), 50);
                    // Force le redimensionnement de l'échiquier une fois visible
                    window.dispatchEvent(new Event('resize'));
                }, 500);
            });
        });

        class AudioController {
            constructor() {
                this.enabled = true;
                this.sounds = {
                    move: new Audio('https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Move.ogg'),
                    capture: new Audio('https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Capture.ogg'),
                    check: new Audio('https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/GenericNotify.ogg')
                };
            }

            setMute(isMuted) {
                this.enabled = !isMuted;
            }

            play(type) {
                if (!this.enabled) return;
                const sound = this.sounds[type];
                if (sound) {
                    sound.currentTime = 0;
                    sound.play().catch(() => {});
                }
            }
        }

        class ChessClock {
            constructor(onTick, onTimeout) {
                this.whiteTime = 0;
                this.blackTime = 0;
                this.activeColor = null;
                this.interval = null;
                this.lastUpdate = 0;
                this.onTick = onTick;
                this.onTimeout = onTimeout;
                this.enabled = false;
            }

            setup(minutes, savedWhiteTime = null, savedBlackTime = null) {
                this.stop();
                this.enabled = minutes > 0;
                if (this.enabled) {
                    this.whiteTime = savedWhiteTime !== null ? savedWhiteTime : minutes * 60 * 1000;
                    this.blackTime = savedBlackTime !== null ? savedBlackTime : minutes * 60 * 1000;
                } else {
                    this.whiteTime = 0;
                    this.blackTime = 0;
                }
                this.activeColor = null;
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }

            start(color) {
                if (!this.enabled) return;
                this.activeColor = color;
                this.lastUpdate = Date.now();
                if (!this.interval) {
                    this.interval = setInterval(() => this.tick(), 50);
                }
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }

            stop() {
                if (this.interval) {
                    clearInterval(this.interval);
                    this.interval = null;
                }
                this.activeColor = null;
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }

            tick() {
                const now = Date.now();
                const delta = now - this.lastUpdate;
                this.lastUpdate = now;

                if (this.activeColor === 'w') {
                    this.whiteTime = Math.max(0, this.whiteTime - delta);
                    if (this.whiteTime === 0) {
                        this.stop();
                        this.onTimeout('w');
                    }
                } else if (this.activeColor === 'b') {
                    this.blackTime = Math.max(0, this.blackTime - delta);
                    if (this.blackTime === 0) {
                        this.stop();
                        this.onTimeout('b');
                    }
                }
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }
        }

        class AIController {
            constructor(onMoveReady, onEvalReady) {
                const workerCode = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');`;
                const blob = new Blob([workerCode], {type: 'application/javascript'});
                this.worker = new Worker(URL.createObjectURL(blob));
                
                this.onEvalReady = onEvalReady;
                this.isEvaluatingOnly = false;
                this.currentFen = '';
                
                this.worker.onmessage = (event) => {
                    const line = event.data;
                    
                    const infoMatch = line.match(/info.*score (cp|mate) (-?\d+)/);
                    if (infoMatch) {
                        const type = infoMatch[1];
                        let value = parseInt(infoMatch[2], 10);
                        
                        const isWhiteTurn = this.currentFen.split(' ')[1] === 'w';
                        if (!isWhiteTurn) {
                            value = -value;
                        }
                        
                        this.onEvalReady({ type, value });
                    }

                    const match = line.match(/^bestmove\s([a-h][1-8])([a-h][1-8])([qrbn])?/);
                    if (match) {
                        if (!this.isEvaluatingOnly) {
                            onMoveReady({ from: match[1], to: match[2], promotion: match[3] || 'q' });
                        }
                    }
                };
            }

            calculate(fen, level) {
                this.isEvaluatingOnly = false;
                this.currentFen = fen;
                const depth = level === 1 ? 5 : level === 2 ? 10 : 15;
                const skill = level === 1 ? 5 : level === 2 ? 10 : 20;
                this.worker.postMessage('stop');
                this.worker.postMessage(`setoption name Skill Level value ${skill}`);
                this.worker.postMessage(`position fen ${fen}`);
                this.worker.postMessage(`go depth ${depth}`);
            }

            evaluate(fen) {
                this.isEvaluatingOnly = true;
                this.currentFen = fen;
                this.worker.postMessage('stop');
                this.worker.postMessage(`position fen ${fen}`);
                this.worker.postMessage(`go depth 12`);
            }
        }

        class UIController {
            constructor(callbacks) {
                this.callbacks = callbacks;
                this.board = null;
                
                this.elements = {
                    status: document.getElementById('status-bar'),
                    engineStatus: document.getElementById('engine-status'),
                    difficulty: document.getElementById('difficulty'),
                    timeControl: document.getElementById('time-control'),
                    playerColor: document.getElementById('player-color'),
                    resetBtn: document.getElementById('reset-btn'),
                    soundBtn: document.getElementById('sound-btn'),
                    promotionModal: document.getElementById('promotion-modal'),
                    moveHistory: document.getElementById('move-history'),
                    copyPgnBtn: document.getElementById('copy-pgn-btn'),
                    evalBar: document.getElementById('eval-bar'),
                    evalFill: document.getElementById('eval-fill'),
                    evalText: document.getElementById('eval-text'),
                    topClock: document.getElementById('top-clock'),
                    bottomClock: document.getElementById('bottom-clock')
                };

                this.elements.resetBtn.addEventListener('click', () => this.callbacks.onReset());
                this.elements.copyPgnBtn.addEventListener('click', () => this.callbacks.onCopyPgn());
                this.elements.difficulty.addEventListener('change', () => this.callbacks.onSettingsChange());
                this.elements.playerColor.addEventListener('change', () => this.callbacks.onReset());
                this.elements.timeControl.addEventListener('change', () => this.callbacks.onReset());
                
                this.elements.soundBtn.addEventListener('click', () => {
                    const isMuted = this.callbacks.onToggleSound();
                    this.elements.soundBtn.textContent = isMuted ? "Son: OFF" : "Son: ON";
                    this.elements.soundBtn.classList.toggle('bg-red-900', isMuted);
                    this.elements.soundBtn.classList.toggle('text-red-200', isMuted);
                });
                
                document.querySelectorAll('.promo-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.elements.promotionModal.classList.add('hidden');
                        this.callbacks.onPromotionSelected(e.target.dataset.piece);
                    });
                });
            }

            initBoard(fen, playerColor) {
                if (this.board) {
                    this.board.destroy();
                }

                this.board = new Chessboard(document.getElementById("board"), {
                    position: fen,
                    orientation: playerColor === 'w' ? COLOR.white : COLOR.black,
                    assetsUrl: "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/assets/",
                    style: { cssClass: "default" },
                    extensions: [{class: Markers}]
                });

                this.board.enableMoveInput((event) => {
                    switch (event.type) {
                        case INPUT_EVENT_TYPE.moveInputStarted:
                            const canMove = this.callbacks.canMove(event.squareFrom);
                            if (canMove) {
                                const moves = this.callbacks.getLegalMoves(event.squareFrom);
                                this.showLegalMoves(moves);
                            }
                            return canMove;

                        case INPUT_EVENT_TYPE.validateMoveInput:
                            return this.callbacks.isValidMove(event.squareFrom, event.squareTo);

                        case INPUT_EVENT_TYPE.moveInputCanceled:
                            this.hideLegalMoves();
                            break;

                        case INPUT_EVENT_TYPE.moveInputFinished:
                            this.hideLegalMoves();
                            if (event.legalMove) {
                                this.callbacks.onMoveCompleted(event.squareFrom, event.squareTo);
                            }
                            break;
                    }
                });
                
                this.setupEvalBar(playerColor);
            }
            
            setupEvalBar(playerColor) {
                const isWhiteBottom = playerColor === 'w';
                const baseClasses = "rounded flex flex-col-reverse overflow-hidden relative border border-gray-700 shrink-0 ";
                const wClasses = "w-4 sm:w-6 md:w-8 ";
                
                if (isWhiteBottom) {
                    this.elements.evalBar.className = wClasses + baseClasses + "bg-gray-800";
                    this.elements.evalFill.className = "bg-gray-300 w-full transition-all duration-300 ease-out";
                } else {
                    this.elements.evalBar.className = wClasses + baseClasses + "bg-gray-300";
                    this.elements.evalFill.className = "bg-gray-800 w-full transition-all duration-300 ease-out";
                }
            }

            updateEvalBar(scoreData, playerColor) {
                let percent = 50;
                let text = "0.0";
                const isWhiteBottom = playerColor === 'w';
                
                if (scoreData.type === 'cp') {
                    const pawnAdvantage = scoreData.value / 100;
                    text = (pawnAdvantage > 0 ? "+" : "") + pawnAdvantage.toFixed(1);
                    
                    let clampedPercentage = 50 + (scoreData.value / 15);
                    clampedPercentage = Math.max(5, Math.min(95, clampedPercentage));
                    
                    percent = isWhiteBottom ? clampedPercentage : 100 - clampedPercentage;
                    
                } else if (scoreData.type === 'mate') {
                    const isWhiteMate = scoreData.value > 0;
                    text = "M" + Math.abs(scoreData.value);
                    
                    if (isWhiteMate) {
                        percent = isWhiteBottom ? 100 : 0;
                    } else {
                        percent = isWhiteBottom ? 0 : 100;
                    }
                }

                this.elements.evalFill.style.height = `${percent}%`;
                this.elements.evalText.textContent = text;
                
                // Adapte la couleur du texte en fonction du remplissage pour rester lisible
                if (percent > 55) {
                    this.elements.evalText.classList.add('text-gray-900');
                    this.elements.evalText.classList.remove('text-white');
                } else {
                    this.elements.evalText.classList.add('text-white');
                    this.elements.evalText.classList.remove('text-gray-900');
                }
            }

            formatTime(ms) {
                if (ms <= 0) return "00:00.0";
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                if (ms < 10000) { 
                    const tenths = Math.floor((ms % 1000) / 100);
                    return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${tenths}`;
                }
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            updateClocks(whiteTime, blackTime, isEnabled, activeColor, playerColor) {
                if (!isEnabled) {
                    this.elements.topClock.textContent = "--:--";
                    this.elements.bottomClock.textContent = "--:--";
                    this.elements.topClock.classList.remove('clock-active');
                    this.elements.bottomClock.classList.remove('clock-active');
                    return;
                }

                const isWhiteBottom = playerColor === 'w';
                const bottomTime = isWhiteBottom ? whiteTime : blackTime;
                const topTime = isWhiteBottom ? blackTime : whiteTime;
                const bottomActive = isWhiteBottom ? activeColor === 'w' : activeColor === 'b';
                const topActive = isWhiteBottom ? activeColor === 'b' : activeColor === 'w';

                this.elements.bottomClock.textContent = this.formatTime(bottomTime);
                this.elements.topClock.textContent = this.formatTime(topTime);

                this.elements.bottomClock.classList.toggle('clock-active', bottomActive);
                this.elements.topClock.classList.toggle('clock-active', topActive);
            }

            showLegalMoves(moves) {
                this.hideLegalMoves();
                moves.forEach(move => {
                    this.board.addMarker(MARKER_TYPE.dot, move.to);
                });
            }

            hideLegalMoves() {
                this.board.removeMarkers(MARKER_TYPE.dot);
            }

            highlightLastMove(from, to) {
                this.board.removeMarkers(MARKER_TYPE.frame);
                this.board.addMarker(MARKER_TYPE.frame, from);
                this.board.addMarker(MARKER_TYPE.frame, to);
            }

            clearHighlights() {
                if (!this.board) return;
                this.board.removeMarkers(MARKER_TYPE.frame);
                this.board.removeMarkers(MARKER_TYPE.dot);
            }

            updateBoard(fen) {
                this.board.setPosition(fen, true);
            }

            updateHistory(history) {
                this.elements.moveHistory.innerHTML = '';
                for (let i = 0; i < history.length; i += 2) {
                    const moveNum = Math.floor(i / 2) + 1;
                    const whiteMove = history[i];
                    const blackMove = history[i + 1] ? history[i + 1] : '';
                    
                    const row = document.createElement('div');
                    row.className = 'flex justify-between hover:bg-gray-700 px-1 sm:px-2 py-1 rounded text-gray-300';
                    row.innerHTML = `
                        <span class="w-6 sm:w-8 text-gray-500 select-none">${moveNum}.</span>
                        <span class="w-16 sm:w-20 font-semibold">${whiteMove}</span>
                        <span class="w-16 sm:w-20 font-semibold">${blackMove}</span>
                    `;
                    this.elements.moveHistory.appendChild(row);
                }
                this.elements.moveHistory.scrollTop = this.elements.moveHistory.scrollHeight;
            }

            showPromotionModal() {
                this.elements.promotionModal.classList.remove('hidden');
            }

            setEngineStatus(visible) {
                if (visible) {
                    this.elements.engineStatus.classList.remove('hidden');
                } else {
                    this.elements.engineStatus.classList.add('hidden');
                }
            }

            getDifficulty() {
                return parseInt(this.elements.difficulty.value, 10);
            }
            
            setDifficulty(level) {
                this.elements.difficulty.value = level;
            }

            getTimeControl() {
                return parseInt(this.elements.timeControl.value, 10);
            }

            setTimeControl(minutes) {
                this.elements.timeControl.value = minutes;
            }

            getPlayerColor() {
                return this.elements.playerColor.value;
            }

            setPlayerColor(color) {
                this.elements.playerColor.value = color;
            }

            setSoundUI(isMuted) {
                this.elements.soundBtn.textContent = isMuted ? dict[currentLang].sonOff : dict[currentLang].sonOn;
                this.elements.soundBtn.classList.toggle('bg-red-900', isMuted);
                this.elements.soundBtn.classList.toggle('text-red-200', isMuted);
            }

            updateStatus(textKey, type) {
                this.elements.status.textContent = dict[currentLang][textKey] || textKey;
                const baseClasses = "mb-2 text-center h-6 sm:h-8 font-bold ";
                
                if (type === 'danger') {
                    this.elements.status.className = baseClasses + "text-base sm:text-xl text-red-500";
                } else if (type === 'warning') {
                    this.elements.status.className = baseClasses + "text-sm sm:text-lg text-orange-400";
                } else if (type === 'neutral') {
                    this.elements.status.className = baseClasses + "text-base sm:text-xl text-gray-400";
                } else {
                    this.elements.status.className = "mb-2 text-center h-6 sm:h-8 font-semibold text-sm sm:text-lg text-gray-300";
                }
            }
        }

        class GameManager {
            constructor() {
                this.chess = new Chess();
                this.pendingMove = null;
                this.playerColor = 'w';
                this.timeoutColor = null;
                this.isMuted = false;
                
                this.audio = new AudioController();

                this.ai = new AIController(
                    (move) => this.executeAIMove(move),
                    (score) => this.ui.updateEvalBar(score, this.playerColor)
                );

                this.clock = new ChessClock(
                    (wTime, bTime, isEnabled, activeColor) => this.ui.updateClocks(wTime, bTime, isEnabled, activeColor, this.playerColor),
                    (color) => this.handleTimeout(color)
                );
                
                this.ui = new UIController({
                    onReset: () => this.start(true),
                    onSettingsChange: () => {
                        this.saveSession();
                        if (this.chess.turn() === this.playerColor && !this.isGameOver()) {
                           this.ai.evaluate(this.chess.fen());
                        }
                    },
                    canMove: (from) => this.canPlayerMove(from),
                    getLegalMoves: (square) => this.chess.moves({ square, verbose: true }),
                    isValidMove: (from, to) => this.validateMove(from, to),
                    onMoveCompleted: (from, to) => this.handleMoveCompleted(from, to),
                    onPromotionSelected: (piece) => this.executePlayerMove(piece),
                    onCopyPgn: () => this.copyPgn(),
                    onToggleSound: () => {
                        this.isMuted = !this.isMuted;
                        this.audio.setMute(this.isMuted);
                        this.saveSession();
                        return this.isMuted;
                    }
                });

                window.addEventListener('beforeunload', () => this.saveSession());
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'hidden') {
                        this.saveSession();
                    }
                });
            }

            saveSession() {
                try {
                    const session = {
                        pgn: this.chess.pgn(),
                        playerColor: this.playerColor,
                        difficulty: this.ui.getDifficulty(),
                        timeControl: this.ui.getTimeControl(),
                        whiteTime: this.clock.whiteTime,
                        blackTime: this.clock.blackTime,
                        timeoutColor: this.timeoutColor,
                        isMuted: this.isMuted
                    };
                    localStorage.setItem('chess_session', JSON.stringify(session));
                } catch (e) {}
            }

            playMoveSound(moveResult) {
                if (this.chess.isCheck() || this.chess.isCheckmate()) {
                    this.audio.play('check');
                } else if (moveResult.captured) {
                    this.audio.play('capture');
                } else {
                    this.audio.play('move');
                }
            }

            copyPgn() {
                const pgn = this.chess.pgn();
                if (!pgn) return;
                
                const textarea = document.createElement('textarea');
                textarea.value = pgn;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const btn = this.ui.elements.copyPgnBtn;
                    const originalText = btn.textContent;
                    btn.textContent = dict[currentLang].copied;
                    setTimeout(() => btn.textContent = originalText, 2000);
                } catch (err) {}
                document.body.removeChild(textarea);
            }

            isGameOver() {
                return this.chess.isGameOver() || this.timeoutColor !== null;
            }

            handleTimeout(color) {
                this.timeoutColor = color;
                this.ui.setEngineStatus(false);
                this.saveSession();
                this.updateGameState();
            }

            start(forceNew = false) {
                this.pendingMove = null;
                this.timeoutColor = null;
                let loaded = false;

                if (!forceNew) {
                    const saved = localStorage.getItem('chess_session');
                    if (saved) {
                        try {
                            const data = JSON.parse(saved);
                            this.chess.loadPgn(data.pgn);
                            this.playerColor = data.playerColor;
                            this.timeoutColor = data.timeoutColor || null;
                            this.isMuted = data.isMuted || false;
                            
                            this.ui.setDifficulty(data.difficulty);
                            this.ui.setTimeControl(data.timeControl);
                            this.ui.setPlayerColor(data.playerColor);
                            this.ui.setSoundUI(this.isMuted);
                            this.audio.setMute(this.isMuted);
                            
                            this.clock.setup(data.timeControl, data.whiteTime, data.blackTime);
                            loaded = true;
                        } catch (e) {
                            localStorage.removeItem('chess_session');
                        }
                    }
                }

                if (!loaded) {
                    this.chess.reset();
                    this.playerColor = this.ui.getPlayerColor();
                    this.clock.setup(this.ui.getTimeControl());
                    localStorage.removeItem('chess_session');
                }

                // Force l'orientation en fonction du mode
                const orientation = this.playerColor === 'b' ? 'b' : 'w';
                this.ui.initBoard(this.chess.fen(), orientation);
                this.ui.clearHighlights();
                this.updateGameState();

                if (!this.isGameOver()) {
                    if (this.chess.history().length > 0 || this.chess.turn() === 'b' || this.playerColor === 'auto') {
                        this.clock.start(this.chess.turn());
                    }

                    if (this.playerColor === 'auto' || this.chess.turn() !== this.playerColor) {
                        this.ui.setEngineStatus(true);
                        // Délai initial court pour le mode auto
                        setTimeout(() => {
                            if (!this.isGameOver()) this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
                        }, 200);
                    } else {
                        this.ui.setEngineStatus(false);
                        this.ai.evaluate(this.chess.fen());
                    }
                } else {
                    this.ui.setEngineStatus(false);
                }
            }

            canPlayerMove(from) {
                if (this.isGameOver() || this.playerColor === 'auto' || this.chess.turn() !== this.playerColor) return false;
                const piece = this.chess.get(from);
                return piece && piece.color === this.playerColor;
            }

            validateMove(from, to) {
                const moves = this.chess.moves({ verbose: true });
                let isPromotion = false;
                const piece = this.chess.get(from);
                
                if (piece && piece.type === 'p' && to[1] === (this.playerColor === 'w' ? '8' : '1')) {
                    isPromotion = true;
                }
                
                return moves.some(m => m.from === from && m.to === to && (!isPromotion || m.promotion));
            }

            handleMoveCompleted(from, to) {
                const piece = this.chess.get(from);
                if (piece && piece.type === 'p' && to[1] === (this.playerColor === 'w' ? '8' : '1')) {
                    this.pendingMove = { from, to };
                    this.ui.showPromotionModal();
                    return;
                }
                this.executePlayerMove(null, { from, to });
            }

            executePlayerMove(promotionPiece, moveObj = null) {
                const move = moveObj || this.pendingMove;
                if (promotionPiece) {
                    move.promotion = promotionPiece;
                }

                try {
                    const result = this.chess.move(move);
                    this.playMoveSound(result);
                    
                    this.ui.updateBoard(this.chess.fen());
                    this.ui.highlightLastMove(result.from, result.to);
                    this.clock.start(this.chess.turn());
                    this.saveSession();
                    this.updateGameState();
                    
                    if (!this.isGameOver()) {
                        this.ui.setEngineStatus(true);
                        this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
                    } else {
                        this.ai.evaluate(this.chess.fen());
                    }
                } catch (e) {
                    this.ui.updateBoard(this.chess.fen());
                }
                
                this.pendingMove = null;
            }

            executeAIMove(move) {
                if (this.isGameOver()) return;

                const result = this.chess.move(move);
                this.playMoveSound(result);
                
                this.ui.updateBoard(this.chess.fen());
                this.ui.highlightLastMove(result.from, result.to);
                this.ui.setEngineStatus(false);
                this.clock.start(this.chess.turn());
                this.saveSession();
                this.updateGameState();
                
                if (!this.isGameOver()) {
                    if (this.playerColor === 'auto') {
                        this.ui.setEngineStatus(true);
                        // Délai volontaire pour rendre le match IA observable
                        setTimeout(() => {
                            if (!this.isGameOver() && this.playerColor === 'auto') {
                                this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
                            }
                        }, 600);
                    } else {
                        this.ai.evaluate(this.chess.fen());
                    }
                }
            }

            updateGameState() {
                this.ui.updateHistory(this.chess.history());

                if (this.isGameOver()) {
                    this.clock.stop();
                    if (this.timeoutColor) {
                        let winnerKey = 'timeAuto';
                        if (this.playerColor !== 'auto') {
                            winnerKey = this.timeoutColor !== this.playerColor ? 'timeWin' : 'timeLose';
                        }
                        this.ui.updateStatus(winnerKey, 'danger');
                    } else if (this.chess.isCheckmate()) {
                        let winnerKey = 'mateAuto';
                        if (this.playerColor !== 'auto') {
                            winnerKey = this.chess.turn() !== this.playerColor ? 'mateWin' : 'mateLose';
                        }
                        this.ui.updateStatus(winnerKey, 'danger');
                    } else {
                        this.ui.updateStatus('draw', 'neutral');
                    }
                    return;
                }

                if (this.chess.isCheck()) {
                    this.ui.updateStatus('check', 'warning');
                } else {
                    let turnKey = 'turnAuto';
                    if (this.playerColor !== 'auto') {
                        const isPlayerTurn = this.chess.turn() === this.playerColor;
                        turnKey = isPlayerTurn ? 'turnYou' : 'turnComp';
                    }
                    this.ui.updateStatus(turnKey, 'info');
                }
            }
        }

        const game = new GameManager();
        game.start(false);
    </script>
</body>
