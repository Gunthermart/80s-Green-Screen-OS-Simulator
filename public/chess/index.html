<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu d'Échecs</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/assets/chessboard.css">

    <style>
        body {
            background-color: #f3f4f6;
            color: #1f2937;
        }
        #main-board-area {
            width: 100%;
        }
        .board {
            width: 100%;
            aspect-ratio: 1 / 1;
        }
        .clock-active {
            background-color: #fef08a !important;
            border-color: #eab308 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <div class="w-full max-w-5xl bg-white p-6 rounded-lg shadow-md flex flex-col md:flex-row gap-6">
        
        <div class="flex-1 flex flex-col items-center">
            <header class="w-full mb-6 flex flex-col lg:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-bold uppercase tracking-wide">Échecs</h1>
                
                <div class="flex flex-wrap items-center justify-center gap-2">
                    <select id="player-color" class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="w" selected>Blancs</option>
                        <option value="b">Noirs</option>
                    </select>
                    <select id="difficulty" class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="0">Niveau 0 (Débutant)</option>
                        <option value="1" selected>Niveau 1 (Facile)</option>
                        <option value="2">Niveau 2 (Moyen)</option>
                        <option value="3">Niveau 3 (Difficile)</option>
                    </select>
                    <select id="time-control" class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5">
                        <option value="0" selected>Infini</option>
                        <option value="3">3 min</option>
                        <option value="5">5 min</option>
                        <option value="10">10 min</option>
                    </select>
                    <button id="sound-btn" class="bg-gray-200 text-gray-800 px-3 py-2 rounded text-sm font-medium hover:bg-gray-300 transition w-20">
                        Son: ON
                    </button>
                    <button id="reset-btn" class="bg-gray-800 text-white px-4 py-2 rounded font-medium hover:bg-gray-700 transition">
                        Nouvelle Partie
                    </button>
                </div>
            </header>

            <div id="status-bar" class="w-full mb-4 text-center font-semibold text-lg h-8">
                Chargement...
            </div>

            <div class="w-full max-w-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="font-bold text-sm text-gray-700">Ordinateur</span>
                    <span id="top-clock" class="font-mono font-bold text-lg bg-gray-100 border border-gray-300 rounded px-3 py-1 transition-colors">--:--</span>
                </div>

                <div id="main-board-area" class="flex gap-2">
                    <div id="eval-bar" class="w-6 md:w-8 bg-gray-800 rounded flex flex-col-reverse overflow-hidden relative border border-gray-300 shrink-0">
                        <div id="eval-fill" class="bg-white w-full transition-all duration-300 ease-out" style="height: 50%;"></div>
                        <span id="eval-text" class="absolute inset-0 flex items-center justify-center text-[10px] md:text-xs font-bold text-white z-10 pointer-events-none mix-blend-difference">0.0</span>
                    </div>
                    <div id="board" class="board flex-1"></div>
                </div>

                <div class="flex justify-between items-center mt-2 px-1">
                    <span class="font-bold text-sm text-gray-700">Vous</span>
                    <span id="bottom-clock" class="font-mono font-bold text-lg bg-gray-100 border border-gray-300 rounded px-3 py-1 transition-colors">--:--</span>
                </div>
            </div>
            
            <div id="engine-status" class="mt-4 text-sm text-gray-500 text-center hidden">
                L'ordinateur réfléchit...
            </div>
        </div>

        <div class="w-full md:w-72 flex flex-col bg-gray-50 border border-gray-200 rounded-lg p-4">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">Historique</h2>
            <div id="move-history" class="flex-1 overflow-y-auto mb-4 text-sm font-mono space-y-1 h-64 md:h-[calc(100%-4rem)]">
            </div>
            <button id="copy-pgn-btn" class="w-full bg-gray-200 text-gray-800 px-4 py-2 rounded font-medium hover:bg-gray-300 transition">
                Copier PGN
            </button>
        </div>

    </div>

    <div id="promotion-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded-lg shadow-xl text-center">
            <h2 class="text-xl font-bold mb-4">Choisissez la promotion</h2>
            <div class="flex gap-4 justify-center">
                <button class="promo-btn text-5xl p-2 hover:bg-gray-100 rounded border transition cursor-pointer" data-piece="q">♕</button>
                <button class="promo-btn text-5xl p-2 hover:bg-gray-100 rounded border transition cursor-pointer" data-piece="r">♖</button>
                <button class="promo-btn text-5xl p-2 hover:bg-gray-100 rounded border transition cursor-pointer" data-piece="b">♗</button>
                <button class="promo-btn text-5xl p-2 hover:bg-gray-100 rounded border transition cursor-pointer" data-piece="n">♘</button>
            </div>
        </div>
    </div>

    <script type="module">
        import {Chessboard, INPUT_EVENT_TYPE, COLOR} from "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/src/Chessboard.js";
        import {MARKER_TYPE, Markers} from "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/src/extensions/markers/Markers.js";
        import {Chess} from "https://esm.sh/chess.js@1.0.0-beta.8";

        class AudioController {
            constructor() {
                this.enabled = true;
                this.sounds = {
                    move: new Audio('https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Move.ogg'),
                    capture: new Audio('https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Capture.ogg'),
                    check: new Audio('https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/GenericNotify.ogg')
                };
            }

            setMute(isMuted) {
                this.enabled = !isMuted;
            }

            play(type) {
                if (!this.enabled) return;
                const sound = this.sounds[type];
                if (sound) {
                    sound.currentTime = 0;
                    sound.play().catch(() => {});
                }
            }
        }

        class ChessClock {
            constructor(onTick, onTimeout) {
                this.whiteTime = 0;
                this.blackTime = 0;
                this.activeColor = null;
                this.interval = null;
                this.lastUpdate = 0;
                this.onTick = onTick;
                this.onTimeout = onTimeout;
                this.enabled = false;
            }

            setup(minutes, savedWhiteTime = null, savedBlackTime = null) {
                this.stop();
                this.enabled = minutes > 0;
                if (this.enabled) {
                    this.whiteTime = savedWhiteTime !== null ? savedWhiteTime : minutes * 60 * 1000;
                    this.blackTime = savedBlackTime !== null ? savedBlackTime : minutes * 60 * 1000;
                } else {
                    this.whiteTime = 0;
                    this.blackTime = 0;
                }
                this.activeColor = null;
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }

            start(color) {
                if (!this.enabled) return;
                this.activeColor = color;
                this.lastUpdate = Date.now();
                if (!this.interval) {
                    this.interval = setInterval(() => this.tick(), 50);
                }
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }

            stop() {
                if (this.interval) {
                    clearInterval(this.interval);
                    this.interval = null;
                }
                this.activeColor = null;
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }

            tick() {
                const now = Date.now();
                const delta = now - this.lastUpdate;
                this.lastUpdate = now;

                if (this.activeColor === 'w') {
                    this.whiteTime = Math.max(0, this.whiteTime - delta);
                    if (this.whiteTime === 0) {
                        this.stop();
                        this.onTimeout('w');
                    }
                } else if (this.activeColor === 'b') {
                    this.blackTime = Math.max(0, this.blackTime - delta);
                    if (this.blackTime === 0) {
                        this.stop();
                        this.onTimeout('b');
                    }
                }
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }
        }

        class AIController {
            constructor(onMoveReady, onEvalReady) {
                const workerCode = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');`;
                const blob = new Blob([workerCode], {type: 'application/javascript'});
                this.worker = new Worker(URL.createObjectURL(blob));
                
                this.onEvalReady = onEvalReady;
                this.isEvaluatingOnly = false;
                this.currentFen = '';
                
                this.worker.onmessage = (event) => {
                    const line = event.data;
                    
                    const infoMatch = line.match(/info.*score (cp|mate) (-?\d+)/);
                    if (infoMatch) {
                        const type = infoMatch[1];
                        let value = parseInt(infoMatch[2], 10);
                        
                        const isWhiteTurn = this.currentFen.split(' ')[1] === 'w';
                        if (!isWhiteTurn) {
                            value = -value;
                        }
                        
                        this.onEvalReady({ type, value });
                    }

                    const match = line.match(/^bestmove\s([a-h][1-8])([a-h][1-8])([qrbn])?/);
                    if (match) {
                        if (!this.isEvaluatingOnly) {
                            onMoveReady({ from: match[1], to: match[2], promotion: match[3] || 'q' });
                        }
                    }
                };
            }

            calculate(fen, level) {
                this.isEvaluatingOnly = false;
                this.currentFen = fen;
                const depth = level === 1 ? 5 : level === 2 ? 10 : 15;
                const skill = level === 1 ? 5 : level === 2 ? 10 : 20;
                this.worker.postMessage('stop');
                this.worker.postMessage(`setoption name Skill Level value ${skill}`);
                this.worker.postMessage(`position fen ${fen}`);
                this.worker.postMessage(`go depth ${depth}`);
            }

            evaluate(fen) {
                this.isEvaluatingOnly = true;
                this.currentFen = fen;
                this.worker.postMessage('stop');
                this.worker.postMessage(`position fen ${fen}`);
                this.worker.postMessage(`go depth 12`);
            }
        }

        class UIController {
            constructor(callbacks) {
                this.callbacks = callbacks;
                this.board = null;
                
                this.elements = {
                    status: document.getElementById('status-bar'),
                    engineStatus: document.getElementById('engine-status'),
                    difficulty: document.getElementById('difficulty'),
                    timeControl: document.getElementById('time-control'),
                    playerColor: document.getElementById('player-color'),
                    resetBtn: document.getElementById('reset-btn'),
                    soundBtn: document.getElementById('sound-btn'),
                    promotionModal: document.getElementById('promotion-modal'),
                    moveHistory: document.getElementById('move-history'),
                    copyPgnBtn: document.getElementById('copy-pgn-btn'),
                    evalBar: document.getElementById('eval-bar'),
                    evalFill: document.getElementById('eval-fill'),
                    evalText: document.getElementById('eval-text'),
                    topClock: document.getElementById('top-clock'),
                    bottomClock: document.getElementById('bottom-clock')
                };

                this.elements.resetBtn.addEventListener('click', () => this.callbacks.onReset());
                this.elements.copyPgnBtn.addEventListener('click', () => this.callbacks.onCopyPgn());
                this.elements.difficulty.addEventListener('change', () => this.callbacks.onSettingsChange());
                this.elements.playerColor.addEventListener('change', () => this.callbacks.onReset());
                this.elements.timeControl.addEventListener('change', () => this.callbacks.onReset());
                
                this.elements.soundBtn.addEventListener('click', () => {
                    const isMuted = this.callbacks.onToggleSound();
                    this.elements.soundBtn.textContent = isMuted ? "Son: OFF" : "Son: ON";
                });
                
                document.querySelectorAll('.promo-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.elements.promotionModal.classList.add('hidden');
                        this.callbacks.onPromotionSelected(e.target.dataset.piece);
                    });
                });
            }

            initBoard(fen, playerColor) {
                if (this.board) {
                    this.board.destroy();
                }

                this.board = new Chessboard(document.getElementById("board"), {
                    position: fen,
                    orientation: playerColor === 'w' ? COLOR.white : COLOR.black,
                    assetsUrl: "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/assets/",
                    style: { cssClass: "default" },
                    extensions: [{class: Markers}]
                });

                this.board.enableMoveInput((event) => {
                    switch (event.type) {
                        case INPUT_EVENT_TYPE.moveInputStarted:
                            const canMove = this.callbacks.canMove(event.squareFrom);
                            if (canMove) {
                                const moves = this.callbacks.getLegalMoves(event.squareFrom);
                                this.showLegalMoves(moves);
                            }
                            return canMove;

                        case INPUT_EVENT_TYPE.validateMoveInput:
                            return this.callbacks.isValidMove(event.squareFrom, event.squareTo);

                        case INPUT_EVENT_TYPE.moveInputCanceled:
                            this.hideLegalMoves();
                            break;

                        case INPUT_EVENT_TYPE.moveInputFinished:
                            this.hideLegalMoves();
                            if (event.legalMove) {
                                this.callbacks.onMoveCompleted(event.squareFrom, event.squareTo);
                            }
                            break;
                    }
                });
                
                this.setupEvalBar(playerColor);
            }
            
            setupEvalBar(playerColor) {
                const isWhiteBottom = playerColor === 'w';
                if (isWhiteBottom) {
                    this.elements.evalBar.className = "w-6 md:w-8 bg-gray-800 rounded flex flex-col-reverse overflow-hidden relative border border-gray-300 shrink-0";
                    this.elements.evalFill.className = "bg-white w-full transition-all duration-300 ease-out";
                } else {
                    this.elements.evalBar.className = "w-6 md:w-8 bg-white rounded flex flex-col-reverse overflow-hidden relative border border-gray-300 shrink-0";
                    this.elements.evalFill.className = "bg-gray-800 w-full transition-all duration-300 ease-out";
                }
            }

            updateEvalBar(scoreData, playerColor) {
                let percent = 50;
                let text = "0.0";
                const isWhiteBottom = playerColor === 'w';
                
                if (scoreData.type === 'cp') {
                    const pawnAdvantage = scoreData.value / 100;
                    text = (pawnAdvantage > 0 ? "+" : "") + pawnAdvantage.toFixed(1);
                    
                    let clampedPercentage = 50 + (scoreData.value / 15);
                    clampedPercentage = Math.max(5, Math.min(95, clampedPercentage));
                    
                    percent = isWhiteBottom ? clampedPercentage : 100 - clampedPercentage;
                    
                } else if (scoreData.type === 'mate') {
                    const isWhiteMate = scoreData.value > 0;
                    text = "M" + Math.abs(scoreData.value);
                    
                    if (isWhiteMate) {
                        percent = isWhiteBottom ? 100 : 0;
                    } else {
                        percent = isWhiteBottom ? 0 : 100;
                    }
                }

                this.elements.evalFill.style.height = `${percent}%`;
                this.elements.evalText.textContent = text;
            }

            formatTime(ms) {
                if (ms <= 0) return "00:00.0";
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                if (ms < 10000) { 
                    const tenths = Math.floor((ms % 1000) / 100);
                    return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${tenths}`;
                }
                return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }

            updateClocks(whiteTime, blackTime, isEnabled, activeColor, playerColor) {
                if (!isEnabled) {
                    this.elements.topClock.textContent = "--:--";
                    this.elements.bottomClock.textContent = "--:--";
                    this.elements.topClock.classList.remove('clock-active');
                    this.elements.bottomClock.classList.remove('clock-active');
                    return;
                }

                const isWhiteBottom = playerColor === 'w';
                const bottomTime = isWhiteBottom ? whiteTime : blackTime;
                const topTime = isWhiteBottom ? blackTime : whiteTime;
                const bottomActive = isWhiteBottom ? activeColor === 'w' : activeColor === 'b';
                const topActive = isWhiteBottom ? activeColor === 'b' : activeColor === 'w';

                this.elements.bottomClock.textContent = this.formatTime(bottomTime);
                this.elements.topClock.textContent = this.formatTime(topTime);

                this.elements.bottomClock.classList.toggle('clock-active', bottomActive);
                this.elements.topClock.classList.toggle('clock-active', topActive);
            }

            showLegalMoves(moves) {
                this.hideLegalMoves();
                moves.forEach(move => {
                    this.board.addMarker(MARKER_TYPE.dot, move.to);
                });
            }

            hideLegalMoves() {
                this.board.removeMarkers(MARKER_TYPE.dot);
            }

            highlightLastMove(from, to) {
                this.board.removeMarkers(MARKER_TYPE.frame);
                this.board.addMarker(MARKER_TYPE.frame, from);
                this.board.addMarker(MARKER_TYPE.frame, to);
            }

            clearHighlights() {
                if (!this.board) return;
                this.board.removeMarkers(MARKER_TYPE.frame);
                this.board.removeMarkers(MARKER_TYPE.dot);
            }

            updateBoard(fen) {
                this.board.setPosition(fen, true);
            }

            updateHistory(history) {
                this.elements.moveHistory.innerHTML = '';
                for (let i = 0; i < history.length; i += 2) {
                    const moveNum = Math.floor(i / 2) + 1;
                    const whiteMove = history[i];
                    const blackMove = history[i + 1] ? history[i + 1] : '';
                    
                    const row = document.createElement('div');
                    row.className = 'flex justify-between hover:bg-gray-200 px-2 py-1 rounded';
                    row.innerHTML = `
                        <span class="w-8 text-gray-400 select-none">${moveNum}.</span>
                        <span class="w-20 font-semibold text-gray-800">${whiteMove}</span>
                        <span class="w-20 font-semibold text-gray-800">${blackMove}</span>
                    `;
                    this.elements.moveHistory.appendChild(row);
                }
                this.elements.moveHistory.scrollTop = this.elements.moveHistory.scrollHeight;
            }

            showPromotionModal() {
                this.elements.promotionModal.classList.remove('hidden');
            }

            setEngineStatus(visible) {
                if (visible) {
                    this.elements.engineStatus.classList.remove('hidden');
                } else {
                    this.elements.engineStatus.classList.add('hidden');
                }
            }

            getDifficulty() {
                return parseInt(this.elements.difficulty.value, 10);
            }
            
            setDifficulty(level) {
                this.elements.difficulty.value = level;
            }

            getTimeControl() {
                return parseInt(this.elements.timeControl.value, 10);
            }

            setTimeControl(minutes) {
                this.elements.timeControl.value = minutes;
            }

            getPlayerColor() {
                return this.elements.playerColor.value;
            }

            setPlayerColor(color) {
                this.elements.playerColor.value = color;
            }

            setSoundUI(isMuted) {
                this.elements.soundBtn.textContent = isMuted ? "Son: OFF" : "Son: ON";
            }

            updateStatus(text, type) {
                this.elements.status.textContent = text;
                if (type === 'danger') {
                    this.elements.status.className = "mb-4 text-center font-bold text-xl text-red-600 h-8";
                } else if (type === 'warning') {
                    this.elements.status.className = "mb-4 text-center font-bold text-lg text-orange-500 h-8";
                } else if (type === 'neutral') {
                    this.elements.status.className = "mb-4 text-center font-bold text-xl text-gray-600 h-8";
                } else {
                    this.elements.status.className = "mb-4 text-center font-semibold text-lg h-8 text-gray-800";
                }
            }
        }

        class GameManager {
            constructor() {
                this.chess = new Chess();
                this.pendingMove = null;
                this.playerColor = 'w';
                this.timeoutColor = null;
                this.isMuted = false;
                
                this.audio = new AudioController();

                this.ai = new AIController(
                    (move) => this.executeAIMove(move),
                    (score) => this.ui.updateEvalBar(score, this.playerColor)
                );

                this.clock = new ChessClock(
                    (wTime, bTime, isEnabled, activeColor) => this.ui.updateClocks(wTime, bTime, isEnabled, activeColor, this.playerColor),
                    (color) => this.handleTimeout(color)
                );
                
                this.ui = new UIController({
                    onReset: () => this.start(true),
                    onSettingsChange: () => {
                        this.saveSession();
                        if (this.chess.turn() === this.playerColor && !this.isGameOver()) {
                           this.ai.evaluate(this.chess.fen());
                        }
                    },
                    canMove: (from) => this.canPlayerMove(from),
                    getLegalMoves: (square) => this.chess.moves({ square, verbose: true }),
                    isValidMove: (from, to) => this.validateMove(from, to),
                    onMoveCompleted: (from, to) => this.handleMoveCompleted(from, to),
                    onPromotionSelected: (piece) => this.executePlayerMove(piece),
                    onCopyPgn: () => this.copyPgn(),
                    onToggleSound: () => {
                        this.isMuted = !this.isMuted;
                        this.audio.setMute(this.isMuted);
                        this.saveSession();
                        return this.isMuted;
                    }
                });
            }

            saveSession() {
                const session = {
                    pgn: this.chess.pgn(),
                    playerColor: this.playerColor,
                    difficulty: this.ui.getDifficulty(),
                    timeControl: this.ui.getTimeControl(),
                    whiteTime: this.clock.whiteTime,
                    blackTime: this.clock.blackTime,
                    timeoutColor: this.timeoutColor,
                    isMuted: this.isMuted
                };
                localStorage.setItem('chess_session', JSON.stringify(session));
            }

            playMoveSound(moveResult) {
                if (this.chess.isCheck() || this.chess.isCheckmate()) {
                    this.audio.play('check');
                } else if (moveResult.captured) {
                    this.audio.play('capture');
                } else {
                    this.audio.play('move');
                }
            }

            copyPgn() {
                const pgn = this.chess.pgn();
                if (!pgn) return;
                
                const textarea = document.createElement('textarea');
                textarea.value = pgn;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const btn = this.ui.elements.copyPgnBtn;
                    const originalText = btn.textContent;
                    btn.textContent = 'Copié !';
                    setTimeout(() => btn.textContent = originalText, 2000);
                } catch (err) {}
                document.body.removeChild(textarea);
            }

            isGameOver() {
                return this.chess.isGameOver() || this.timeoutColor !== null;
            }

            handleTimeout(color) {
                this.timeoutColor = color;
                this.ui.setEngineStatus(false);
                this.saveSession();
                this.updateGameState();
            }

            start(forceNew = false) {
                this.pendingMove = null;
                this.timeoutColor = null;
                let loaded = false;

                if (!forceNew) {
                    const saved = localStorage.getItem('chess_session');
                    if (saved) {
                        try {
                            const data = JSON.parse(saved);
                            this.chess.loadPgn(data.pgn);
                            this.playerColor = data.playerColor;
                            this.timeoutColor = data.timeoutColor || null;
                            this.isMuted = data.isMuted || false;
                            
                            this.ui.setDifficulty(data.difficulty);
                            this.ui.setTimeControl(data.timeControl);
                            this.ui.setPlayerColor(data.playerColor);
                            this.ui.setSoundUI(this.isMuted);
                            this.audio.setMute(this.isMuted);
                            
                            this.clock.setup(data.timeControl, data.whiteTime, data.blackTime);
                            loaded = true;
                        } catch (e) {
                            localStorage.removeItem('chess_session');
                        }
                    }
                }

                if (!loaded) {
                    this.chess.reset();
                    this.playerColor = this.ui.getPlayerColor();
                    this.clock.setup(this.ui.getTimeControl());
                    localStorage.removeItem('chess_session');
                }

                this.ui.initBoard(this.chess.fen(), this.playerColor);
                this.ui.clearHighlights();
                this.updateGameState();

                if (!this.isGameOver()) {
                    if (this.chess.history().length > 0 || this.chess.turn() === 'b') {
                        this.clock.start(this.chess.turn());
                    }

                    if (this.chess.turn() !== this.playerColor) {
                        this.ui.setEngineStatus(true);
                        this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
                    } else {
                        this.ui.setEngineStatus(false);
                        this.ai.evaluate(this.chess.fen());
                    }
                } else {
                    this.ui.setEngineStatus(false);
                }
            }

            canPlayerMove(from) {
                if (this.isGameOver() || this.chess.turn() !== this.playerColor) return false;
                const piece = this.chess.get(from);
                return piece && piece.color === this.playerColor;
            }

            validateMove(from, to) {
                const moves = this.chess.moves({ verbose: true });
                let isPromotion = false;
                const piece = this.chess.get(from);
                
                if (piece && piece.type === 'p' && to[1] === (this.playerColor === 'w' ? '8' : '1')) {
                    isPromotion = true;
                }
                
                return moves.some(m => m.from === from && m.to === to && (!isPromotion || m.promotion));
            }

            handleMoveCompleted(from, to) {
                const piece = this.chess.get(from);
                if (piece && piece.type === 'p' && to[1] === (this.playerColor === 'w' ? '8' : '1')) {
                    this.pendingMove = { from, to };
                    this.ui.showPromotionModal();
                    return;
                }
                this.executePlayerMove(null, { from, to });
            }

            executePlayerMove(promotionPiece, moveObj = null) {
                const move = moveObj || this.pendingMove;
                if (promotionPiece) {
                    move.promotion = promotionPiece;
                }

                try {
                    const result = this.chess.move(move);
                    this.playMoveSound(result);
                    
                    this.ui.updateBoard(this.chess.fen());
                    this.ui.highlightLastMove(result.from, result.to);
                    this.clock.start(this.chess.turn());
                    this.saveSession();
                    this.updateGameState();
                    
                    if (!this.isGameOver()) {
                        this.ui.setEngineStatus(true);
                        this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
                    } else {
                        this.ai.evaluate(this.chess.fen());
                    }
                } catch (e) {
                    this.ui.updateBoard(this.chess.fen());
                }
                
                this.pendingMove = null;
            }

            executeAIMove(move) {
                if (this.isGameOver()) return;

                const result = this.chess.move(move);
                this.playMoveSound(result);
                
                this.ui.updateBoard(this.chess.fen());
                this.ui.highlightLastMove(result.from, result.to);
                this.ui.setEngineStatus(false);
                this.clock.start(this.chess.turn());
                this.saveSession();
                this.updateGameState();
                
                if (!this.isGameOver()) {
                    this.ai.evaluate(this.chess.fen());
                }
            }

            updateGameState() {
                this.ui.updateHistory(this.chess.history());

                if (this.isGameOver()) {
                    this.clock.stop();
                    if (this.timeoutColor) {
                        const winner = this.timeoutColor !== this.playerColor ? "Vous avez gagné" : "L'ordinateur a gagné";
                        this.ui.updateStatus(`Défaite au temps. ${winner}.`, 'danger');
                    } else if (this.chess.isCheckmate()) {
                        const winner = this.chess.turn() !== this.playerColor ? "Vous avez gagné" : "L'ordinateur a gagné";
                        this.ui.updateStatus(`Échec et mat. ${winner}.`, 'danger');
                    } else {
                        this.ui.updateStatus("Partie nulle.", 'neutral');
                    }
                    return;
                }

                if (this.chess.isCheck()) {
                    this.ui.updateStatus("Échec.", 'warning');
                } else {
                    const isPlayerTurn = this.chess.turn() === this.playerColor;
                    const turnText = isPlayerTurn ? "À vous de jouer" : "Au tour de l'ordinateur";
                    this.ui.updateStatus(turnText, 'info');
                }
            }
        }

        const game = new GameManager();
        game.start(false);
    </script>
