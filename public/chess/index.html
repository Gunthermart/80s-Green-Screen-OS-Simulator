        class AudioController {

        class ChessClock {
            constructor(onTick, onTimeout) {
                this.whiteTime = 0; this.blackTime = 0; this.activeColor = null;
                this.interval = null; this.lastUpdate = 0;
                this.onTick = onTick; this.onTimeout = onTimeout; this.enabled = false;
            }
            setup(m, w = null, b = null) {
                this.stop();
                this.enabled = m > 0;
                this.whiteTime = w !== null ? w : m * 60 * 1000;
                this.blackTime = b !== null ? b : m * 60 * 1000;
                this.onTick(this.whiteTime, this.blackTime, this.enabled, null);
            }
            start(c) {
                if (!this.enabled) return;
                this.activeColor = c; this.lastUpdate = Date.now();
                if (!this.interval) this.interval = setInterval(() => this.tick(), 50);
            }
            stop() { clearInterval(this.interval); this.interval = null; this.activeColor = null; }
            tick() {
                const now = Date.now(); const delta = now - this.lastUpdate; this.lastUpdate = now;
                if (this.activeColor === 'w') { this.whiteTime = Math.max(0, this.whiteTime - delta); if (this.whiteTime === 0) { this.stop(); this.onTimeout('w'); }}
                else if (this.activeColor === 'b') { this.blackTime = Math.max(0, this.blackTime - delta); if (this.blackTime === 0) { this.stop(); this.onTimeout('b'); }}
                this.onTick(this.whiteTime, this.blackTime, this.enabled, this.activeColor);
            }
        }

        class AIController {
            constructor(onMoveReady, onEvalReady, onVariationsReady) {
                const code = `importScripts('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js');`;
                const blob = new Blob([code], {type: 'application/javascript'});
                this.worker = new Worker(URL.createObjectURL(blob));
                this.onEvalReady = onEvalReady;
                this.onMoveReady = onMoveReady;
                this.onVariationsReady = onVariationsReady;
                this.currentFen = '';
                this.variations = {};
                this.worker.onmessage = (e) => {
                    const line = e.data;
                    const infoMatch = line.match(/info depth (\d+) .* multipv (\d+) score (cp|mate) (-?\d+) .* pv (.*)/);
                    if (infoMatch) {
                        const depth = parseInt(infoMatch[1]);
                        const idx = parseInt(infoMatch[2]);
                        const type = infoMatch[3];
                        let val = parseInt(infoMatch[4]);
                        const pv = infoMatch[5];
                        const isWhite = this.currentFen.split(' ')[1] === 'w';
                        if (!isWhite) val = -val;
                        if (idx === 1) this.onEvalReady({ type, value: val });
                        this.variations[idx] = { depth, type, val, pv: pv.split(' ').slice(0, 5).join(' ') };
                        this.onVariationsReady(Object.values(this.variations).sort((a,b) => a.idx - b.idx));
                    }
                    const bestMatch = line.match(/^bestmove\s([a-h][1-8])([a-h][1-8])([qrbn])?/);
                    if (bestMatch && !this.isEvaluatingOnly) {
                        this.onMoveReady({ from: bestMatch[1], to: bestMatch[2], promotion: bestMatch[3] || 'q' });
                    }
                };
            }
            sendCommand(cmd) { this.worker.postMessage(cmd); }
            calculate(fen, level) {
                this.isEvaluatingOnly = false; this.currentFen = fen; this.variations = {};
                const d = [8, 12, 16, 20][level] || 12;
                this.sendCommand('stop');
                this.sendCommand('setoption name MultiPV value 3');
                this.sendCommand(`position fen ${fen}`);
                this.sendCommand(`go depth ${d}`);
            }
            evaluate(fen) {
                this.isEvaluatingOnly = true; this.currentFen = fen; this.variations = {};
                this.sendCommand('stop');
                this.sendCommand('setoption name MultiPV value 3');
                this.sendCommand(`position fen ${fen}`);
                this.sendCommand(`go depth 14`);
            }
        }

                    variationContainer: document.getElementById('variation-container'),
                    copyPgnBtn: document.getElementById('copy-pgn-btn'),
                    evalFill: document.getElementById('eval-fill'),
                    evalText: document.getElementById('eval-text'),
                    topClock: document.getElementById('top-clock'),
                    bottomClock: document.getElementById('bottom-clock')
                };
                this.elements.resetBtn.onclick = () => this.callbacks.onReset();
                this.elements.copyPgnBtn.onclick = () => this.callbacks.onCopyPgn();
                this.elements.difficulty.onchange = () => this.callbacks.onSettingsChange();
                this.elements.playerColor.onchange = () => this.callbacks.onReset();
                this.elements.timeControl.onchange = () => this.callbacks.onReset();
                this.elements.trainingMode.onchange = () => this.callbacks.onSettingsChange();
                this.elements.soundBtn.onclick = () => this.callbacks.onToggleSound();
                document.querySelectorAll('.promo-btn').forEach(b => b.onclick = (e) => {
                    this.elements.promotionModal.classList.add('hidden');
                    this.callbacks.onPromotionSelected(e.target.dataset.piece);
                });
            }

            getDifficulty() { return parseInt(this.elements.difficulty.value, 10); }
            setDifficulty(l) { this.elements.difficulty.value = l; }
            getTimeControl() { return parseInt(this.elements.timeControl.value, 10); }
            setTimeControl(m) { this.elements.timeControl.value = m; }
            getPlayerColor() { return this.elements.playerColor.value; }
            setPlayerColor(c) { this.elements.playerColor.value = c; }
            getTrainingMode() { return this.elements.trainingMode.value === 'on'; }
            setTrainingMode(on) { this.elements.trainingMode.value = on ? 'on' : 'off'; }
            showPromotionModal() { this.elements.promotionModal.classList.remove('hidden'); }

            updateBoard(fen) {
                if (this.board) this.board.setPosition(fen, true);
            }

            clearHighlights() {
                if (this.board) {
                    this.board.removeMarkers(MARKER_TYPE.frame);
                    this.board.removeMarkers(MARKER_TYPE.dot);
                }
            }

            initBoard(fen, playerColor) {
                if (this.board) this.board.destroy();
                this.board = new Chessboard(document.getElementById("board"), {
                    position: fen, orientation: playerColor === 'w' ? COLOR.white : COLOR.black,
                    assetsUrl: "https://cdn.jsdelivr.net/npm/cm-chessboard@8.5.1/assets/",
                    style: { cssClass: "default" },
                    extensions: [{class: Markers}]
                });
                this.board.enableMoveInput((e) => {
                    if (e.type === INPUT_EVENT_TYPE.moveInputStarted) {
                        const can = this.callbacks.canMove(e.squareFrom);
                        if (can) this.callbacks.getLegalMoves(e.squareFrom).forEach(m => this.board.addMarker(MARKER_TYPE.dot, m.to));
                        return can;
                    }
                    if (e.type === INPUT_EVENT_TYPE.validateMoveInput) return this.callbacks.isValidMove(e.squareFrom, e.squareTo);
                    if (e.type === INPUT_EVENT_TYPE.moveInputFinished) {
                        this.board.removeMarkers(MARKER_TYPE.dot);
                        if (e.legalMove) this.callbacks.onMoveCompleted(e.squareFrom, e.squareTo);
                    }
                });
            }
            updateEvalBar(score, playerColor) {
                let p = 50; let txt = "0.0"; const wBot = playerColor === 'w';
                if (score.type === 'cp') {
                    const v = score.value / 100; txt = (v > 0 ? "+" : "") + v.toFixed(1);
                    p = 50 + (score.value / 15); p = Math.max(5, Math.min(95, p)); if (!wBot) p = 100 - p;
                } else { txt = "M" + Math.abs(score.value); p = (score.value > 0 === wBot) ? 100 : 0; }
                this.elements.evalFill.style.height = p + "%"; this.elements.evalText.textContent = txt;
                this.elements.evalText.className = `absolute inset-0 flex items-center justify-center text-[8px] sm:text-[10px] md:text-xs font-bold z-10 pointer-events-none ${p > 55 ? 'text-gray-900' : 'text-white'}`;
            }
            updateVariations(vars) {
                this.elements.variationContainer.innerHTML = '';
                vars.forEach(v => {
                    const div = document.createElement('div');
                    div.className = 'variation-line bg-gray-700/30 p-1.5 rounded text-[9px] flex flex-col gap-0.5';
                    const score = v.type === 'cp' ? (v.val/100).toFixed(1) : 'M'+v.val;
                    div.innerHTML = `<div class="flex justify-between font-bold text-gray-400"><span>${score}</span><span class="text-[8px]">D:${v.depth}</span></div><div class="text-gray-200 truncate">${v.pv}</div>`;
                    this.elements.variationContainer.appendChild(div);
                });
            }
            formatTime(ms) {
                if (ms <= 0) return "00:00";
                const s = Math.floor(ms / 1000); const m = Math.floor(s / 60); const sec = s % 60;
                return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
            }
            updateClocks(w, b, en, act, pCol) {
                if (!en) { this.elements.topClock.textContent = "--:--"; this.elements.bottomClock.textContent = "--:--"; return; }
                const wBot = pCol === 'w';
                this.elements.bottomClock.textContent = this.formatTime(wBot ? w : b);
                this.elements.topClock.textContent = this.formatTime(wBot ? b : w);
                this.elements.bottomClock.classList.toggle('clock-active', wBot ? act === 'w' : act === 'b');
                this.elements.topClock.classList.toggle('clock-active', wBot ? act === 'b' : act === 'w');
            }
            highlightLastMove(f, t) { this.board.removeMarkers(MARKER_TYPE.frame); this.board.addMarker(MARKER_TYPE.frame, f); this.board.addMarker(MARKER_TYPE.frame, t); }
            updateHistory(history) {
                this.elements.moveHistory.innerHTML = '';
                for (let i = 0; i < history.length; i += 2) {
                    const row = document.createElement('div');
                    row.className = 'flex justify-between px-1 py-0.5 rounded text-gray-400 border-b border-gray-700/30';
                    row.innerHTML = `<span class="w-4 opacity-50 text-[8px]">${Math.floor(i/2)+1}</span><span class="flex-1 font-semibold text-gray-300">${history[i]}</span><span class="flex-1 font-semibold text-gray-300 text-right">${history[i+1]||''}</span>`;
                    this.elements.moveHistory.appendChild(row);
                }
                this.elements.moveHistory.scrollTop = this.elements.moveHistory.scrollHeight;
            }
            setEngineStatus(v) { this.elements.engineStatus.textContent = v ? dict[currentLang].think : ""; }
            setSoundUI(m) { this.elements.soundBtn.textContent = m ? dict[currentLang].sonOff : dict[currentLang].sonOn; this.elements.soundBtn.classList.toggle('bg-red-900', m); }
            updateStatus(k, t) {
                this.elements.status.textContent = dict[currentLang][k] || k;
                const b = "mb-2 text-center h-6 sm:h-8 font-bold text-base sm:text-xl ";
                if (t === 'danger') this.elements.status.className = b + "text-red-500";
                else if (t === 'warning') this.elements.status.className = b + "text-orange-400";
                else if (t === 'neutral') this.elements.status.className = b + "text-gray-400";
                else this.elements.status.className = "mb-2 text-center h-6 sm:h-8 font-semibold text-sm sm:text-lg text-gray-300";
            }
        }

        class GameManager {
            constructor() {
                this.chess = new Chess(); this.playerColor = 'w'; this.isMuted = false; this.lastEval = 0;
                this.ai = new AIController(
                    (m) => this.executeAIMove(m),
                    (s) => { this.lastEval = s.value; this.ui.updateEvalBar(s, this.playerColor); },
                    (v) => this.ui.updateVariations(v)
                );
                this.clock = new ChessClock(
                    (w, b, en, act) => this.ui.updateClocks(w, b, en, act, this.playerColor),
                    (c) => this.handleTimeout(c)
                );
                this.audio = new AudioController();
                this.ui = new UIController({
                    onReset: () => this.start(true),
                    onSettingsChange: () => this.saveSession(),
                    canMove: (f) => !this.isGameOver() && this.playerColor !== 'auto' && this.chess.turn() === this.playerColor && this.chess.get(f)?.color === this.playerColor,
                    getLegalMoves: (s) => this.chess.moves({ square: s, verbose: true }),
                    isValidMove: (f, t) => this.chess.moves({ verbose: true }).some(m => m.from === f && m.to === t),
                    onMoveCompleted: (f, t) => this.handleMoveCompleted(f, t),
                    onPromotionSelected: (p) => this.executePlayerMove(p),
                    onCopyPgn: () => this.copyPgn(),
                    onToggleSound: () => { this.isMuted = !this.isMuted; this.audio.setMute(this.isMuted); this.ui.setSoundUI(this.isMuted); this.saveSession(); }
                });
                window.gameInstance = this;
                this.start(false);
            }
            saveSession() {
                const s = { pgn: this.chess.pgn(), playerColor: this.playerColor, difficulty: this.ui.getDifficulty(), timeControl: this.ui.getTimeControl(), wTime: this.clock.whiteTime, bTime: this.clock.blackTime, muted: this.isMuted, training: this.ui.getTrainingMode() };
                localStorage.setItem('chess_session', JSON.stringify(s));
            }
            copyPgn() {
                const p = this.chess.pgn(); if (!p) return;
                const area = document.createElement('textarea'); area.value = p; document.body.appendChild(area); area.select();
                document.execCommand('copy'); document.body.removeChild(area);
                const old = this.ui.elements.copyPgnBtn.textContent; this.ui.elements.copyPgnBtn.textContent = dict[currentLang].copied;
                setTimeout(() => this.ui.elements.copyPgnBtn.textContent = old, 2000);
            }
            handleTimeout(c) { this.timeoutColor = c; this.updateGameState(); }
            isGameOver() { return this.chess.isGameOver() || this.timeoutColor; }
            start(force) {
                const saved = !force && localStorage.getItem('chess_session');
                if (saved) {
                    const d = JSON.parse(saved); this.chess.loadPgn(d.pgn); this.playerColor = d.playerColor;
                    this.isMuted = d.muted; this.ui.setDifficulty(d.difficulty); this.ui.setTimeControl(d.timeControl);
                    this.ui.setPlayerColor(d.playerColor); this.ui.setTrainingMode(d.training);
                    this.clock.setup(d.timeControl, d.wTime, d.bTime);
                } else {
                    this.chess.reset(); this.playerColor = this.ui.getPlayerColor(); this.clock.setup(this.ui.getTimeControl());
                }
                this.ui.initBoard(this.chess.fen(), this.playerColor === 'auto' ? 'w' : this.playerColor);
                this.ui.setSoundUI(this.isMuted); this.audio.setMute(this.isMuted);
                this.updateGameState();
                if (!this.isGameOver()) {
                    this.clock.start(this.chess.turn());
                    if (this.playerColor === 'auto' || this.chess.turn() !== this.playerColor) this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
                    else this.ai.evaluate(this.chess.fen());
                }
            }
            handleMoveCompleted(f, t) {
                if (this.chess.get(f)?.type === 'p' && (t[1]==='8' || t[1]==='1')) { this.pendingMove = {f, t}; this.ui.showPromotionModal(); }
                else this.executePlayerMove(null, {from: f, to: t});
            }
            async executePlayerMove(p, moveObj) {
                const move = moveObj || this.pendingMove; if (p) move.promotion = p;
                const oldFen = this.chess.fen(); const baseline = this.lastEval;
                const res = this.chess.move(move);
                this.ui.updateBoard(this.chess.fen());
                if (this.ui.getTrainingMode()) {
                    this.ui.setEngineStatus(true); this.ai.evaluate(this.chess.fen());
                    setTimeout(() => {
                        const diff = this.playerColor === 'w' ? (baseline - this.lastEval) : (this.lastEval - baseline);
                        if (diff > 150) { this.chess.undo(); this.ui.updateBoard(oldFen); this.ui.updateStatus('blunder', 'danger'); this.audio.play('check'); }
                        else this.finalizeMove(res);
                    }, 600);
                } else this.finalizeMove(res);
            }
            finalizeMove(res) {
                this.playMoveSound(res); this.ui.highlightLastMove(res.from, res.to); this.clock.start(this.chess.turn());
                this.updateGameState(); this.saveSession();
                if (!this.isGameOver()) this.ai.calculate(this.chess.fen(), this.ui.getDifficulty());
            }
            executeAIMove(m) {
                const res = this.chess.move(m); this.playMoveSound(res); this.ui.updateBoard(this.chess.fen());
                this.ui.highlightLastMove(res.from, res.to); this.clock.start(this.chess.turn());
                this.updateGameState(); this.saveSession();
                if (!this.isGameOver()) {
                    if (this.playerColor === 'auto') setTimeout(() => this.ai.calculate(this.chess.fen(), this.ui.getDifficulty()), 800);
                    else this.ai.evaluate(this.chess.fen());
                }
            }
            playMoveSound(r) { if (this.chess.isCheck()) this.audio.play('check'); else if (r.captured) this.audio.play('capture'); else this.audio.play('move'); }
            
            detectOpening() {
                const history = this.chess.history();
                let currentSeq = "";
                let bestMatch = "";

                for (let i = 0; i < history.length; i++) {
                    currentSeq += (i > 0 ? " " : "") + history[i];
                    if (OPENINGS[currentSeq]) bestMatch = OPENINGS[currentSeq];
                }

                if (bestMatch) {
                    this.ui.elements.openingName.textContent = bestMatch;
                    this.ui.elements.openingName.classList.remove('hidden');
                } else if (history.length === 0) {
                    this.ui.elements.openingName.classList.add('hidden');
                }
            }

            updateGameState() {
                this.detectOpening();
                this.ui.updateHistory(this.chess.history());
                if (this.isGameOver()) {
                    this.clock.stop();
                    const key = this.timeoutColor ? (this.timeoutColor === this.playerColor ? 'timeLose' : 'timeWin') : (this.chess.isCheckmate() ? (this.chess.turn() === this.playerColor ? 'mateLose' : 'mateWin') : 'draw');
                    this.ui.updateStatus(key, 'danger');
                } else {
                    const key = this.playerColor === 'auto' ? 'turnAuto' : (this.chess.turn() === this.playerColor ? 'turnYou' : 'turnComp');
                    this.ui.updateStatus(key, 'info');
                }
            }
        }
        new GameManager();
    </script>
</body>
</html>
