<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engine Numismatique V2 (Standalone)</title>
  
  <!-- Architect Dependencies: CDN React, ReactDOM, Babel & Tailwind -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Architect PDF Engine: jsPDF & AutoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-slate-950">
  <div id="root"></div>

  <!-- Architect Engine: Application React embarquée (Pur JS/JSX) -->
  <script type="text/babel" data-presets="react">
    const { useMemo, useState, useEffect, useRef } = React;

    // ==========================================
    // 0. ZERO-DEPENDENCY ICONS (SVG Purs)
    // ==========================================
    const ShieldCheck = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
    const Coins = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>;
    const TrendingUp = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const Scale = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
    const LineChart = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
    const Trash2 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Download = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Upload = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const FileText = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
    const Edit3 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
    const Plus = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const X = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

    // ==========================================
    // 1. DATA LAYER (Normalisé & Pur JS)
    // ==========================================

    const isValidPortfolioItem = (item) => {
      return (
        typeof item === 'object' &&
        item !== null &&
        typeof item.coinId === 'string' &&
        (typeof item.quantity === 'number' || typeof item.quantity === 'string') &&
        (item.avgBuyPrice === undefined || typeof item.avgBuyPrice === 'number' || typeof item.avgBuyPrice === 'string')
      );
    };

    const TROY_OUNCE_GRAMS = 31.1034768;

    const BASE_COIN_DICTIONARY = {
      'souverain': { id: 'souverain', name: 'Souverain', metal: 'GOLD', grossWeight: 7.988, purity: 0.917 },
      'coq_20f': { id: 'coq_20f', name: 'Coq 20 Francs', metal: 'GOLD', grossWeight: 6.45, purity: 0.900 },
      'hercule_50f': { id: 'hercule_50f', name: 'Hercule 50 Francs', metal: 'SILVER', grossWeight: 30.0, purity: 0.900 },
      'hercule_10f': { id: 'hercule_10f', name: 'Hercule 10 Francs', metal: 'SILVER', grossWeight: 25.0, purity: 0.900 },
      'liberty_10': { id: 'liberty_10', name: 'Liberty 10$', metal: 'GOLD', grossWeight: 16.718, purity: 0.900 },
      'liberty_20': { id: 'liberty_20', name: 'Liberty 20$', metal: 'GOLD', grossWeight: 33.436, purity: 0.900 },
      '10f_or': { id: '10f_or', name: '10 Francs Or', metal: 'GOLD', grossWeight: 3.225, purity: 0.900 },
      '40f_or': { id: '40f_or', name: '40 Francs Or', metal: 'GOLD', grossWeight: 12.90, purity: 0.900 },
      '50f_or': { id: '50f_or', name: '50 Francs Or', metal: 'GOLD', grossWeight: 16.12, purity: 0.900 },
    };

    const DEFAULT_PORTFOLIO = Object.keys(BASE_COIN_DICTIONARY).map(coinId => ({
      coinId, quantity: 0, avgBuyPrice: 0
    }));

    const STORAGE_KEY_PORTFOLIO = '@numismatic_engine/portfolio_v2';
    const STORAGE_KEY_SPOT = '@numismatic_engine/spot_v2';
    const STORAGE_KEY_DICT = '@numismatic_engine/dictionary_v2';

    // ==========================================
    // 2. LOGIQUE METIER (Pure & Performante)
    // ==========================================

    function App() {
      const fileInputRef = useRef(null);
      
      const [customDictionary, setCustomDictionary] = useState(() => {
        try {
          const cached = localStorage.getItem(STORAGE_KEY_DICT);
          if (cached) return JSON.parse(cached);
        } catch (e) { console.warn('Dictionnaire local corrompu.'); }
        return {};
      });

      const fullDictionary = useMemo(() => ({
        ...BASE_COIN_DICTIONARY,
        ...customDictionary
      }), [customDictionary]);

      const [portfolio, setPortfolio] = useState(() => {
        try {
          const cached = localStorage.getItem(STORAGE_KEY_PORTFOLIO);
          if (cached) {
            const parsed = JSON.parse(cached);
            if (Array.isArray(parsed) && parsed.every(isValidPortfolioItem)) return parsed;
          }
        } catch (e) { console.warn('Portfolio local corrompu.'); }
        return [...DEFAULT_PORTFOLIO];
      });

      const [spotPricesOz, setSpotPricesOz] = useState(() => {
        try {
          const cached = localStorage.getItem(STORAGE_KEY_SPOT);
          if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed && 'GOLD' in parsed && 'SILVER' in parsed) return parsed;
          }
        } catch (e) {}
        return { GOLD: 3639.10, SILVER: 49.61 };
      });

      const [selectedAssetToAdd, setSelectedAssetToAdd] = useState("");
      const [showCustomForm, setShowCustomForm] = useState(false);
      const [customAssetForm, setCustomAssetForm] = useState({ name: '', metal: 'GOLD', grossWeight: '', purity: '0.900' });

      useEffect(() => { localStorage.setItem(STORAGE_KEY_PORTFOLIO, JSON.stringify(portfolio)); }, [portfolio]);
      useEffect(() => { localStorage.setItem(STORAGE_KEY_SPOT, JSON.stringify(spotPricesOz)); }, [spotPricesOz]);
      useEffect(() => { localStorage.setItem(STORAGE_KEY_DICT, JSON.stringify(customDictionary)); }, [customDictionary]);

      const spotPriceGram = useMemo(() => ({
        GOLD: (parseFloat(spotPricesOz.GOLD) || 0) / TROY_OUNCE_GRAMS,
        SILVER: (parseFloat(spotPricesOz.SILVER) || 0) / TROY_OUNCE_GRAMS
      }), [spotPricesOz]);

      const updateAsset = (coinId, field, rawValue) => {
        setPortfolio(prev => prev.map(item => 
          item.coinId === coinId ? { ...item, [field]: rawValue } : item
        ));
      };

      const updateSpotOz = (metal, rawValue) => {
        setSpotPricesOz(prev => ({ ...prev, [metal]: rawValue }));
      };

      const removeAsset = (coinId) => {
        if (window.confirm("Retirer cet actif du tableau ? (Les données liées seront perdues)")) {
          setPortfolio(prev => prev.filter(item => item.coinId !== coinId));
        }
      };

      const addExistingAsset = () => {
        if (!selectedAssetToAdd) return;
        setPortfolio(prev => [...prev, { coinId: selectedAssetToAdd, quantity: 0, avgBuyPrice: 0 }]);
        setSelectedAssetToAdd(""); 
      };

      const handleCreateCustomAsset = (e) => {
        e.preventDefault();
        const weight = parseFloat(customAssetForm.grossWeight);
        const purity = parseFloat(customAssetForm.purity);

        if (!customAssetForm.name || isNaN(weight) || isNaN(purity) || purity <= 0 || purity > 1) {
          alert("Erreur: Le nom est requis, le poids doit être > 0, et le titre doit être entre 0 et 1 (ex: 0.900).");
          return;
        }

        const newId = 'custom_' + Date.now();
        const newDef = {
          id: newId,
          name: customAssetForm.name,
          metal: customAssetForm.metal,
          grossWeight: weight,
          purity: purity
        };

        setCustomDictionary(prev => ({ ...prev, [newId]: newDef }));
        setPortfolio(prev => [...prev, { coinId: newId, quantity: 0, avgBuyPrice: 0 }]);
        
        setShowCustomForm(false);
        setCustomAssetForm({ name: '', metal: 'GOLD', grossWeight: '', purity: '0.900' });
      };

      const availableAssets = Object.values(fullDictionary).filter(
        def => !portfolio.some(p => p.coinId === def.id)
      ).sort((a, b) => a.name.localeCompare(b.name));

      const formatCurrency = (val) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(val);

      // ==========================================
      // 3. ENGINE MATHÉMATIQUE (O(N) Memoized)
      // ==========================================

      const portfolioStats = useMemo(() => {
        let totalGoldValue = 0;
        let totalSilverValue = 0;
        let totalAcquisitionCost = 0;
        let totalGoldWeightPure = 0;
        let totalSilverWeightPure = 0;
        
        const detailedAssets = portfolio.map(item => {
          const def = fullDictionary[item.coinId];
          if (!def) return null;

          const pureMetalWeight = def.grossWeight * def.purity;
          const spotPrice = spotPriceGram[def.metal];
          
          const itemQuantity = parseFloat(item.quantity) || 0;
          const itemAvgBuyPrice = parseFloat(item.avgBuyPrice) || 0;

          const intrinsicValuePerCoin = pureMetalWeight * spotPrice;
          const totalIntrinsicValue = intrinsicValuePerCoin * itemQuantity;
          const totalBuyCost = itemAvgBuyPrice * itemQuantity;
          const totalPureWeightLine = pureMetalWeight * itemQuantity;

          const latentLineCapitalGain = totalIntrinsicValue - totalBuyCost;
          const lineRoiPercentage = totalBuyCost > 0 ? (latentLineCapitalGain / totalBuyCost) * 100 : 0;

          if (def.metal === 'GOLD') {
            totalGoldValue += totalIntrinsicValue;
            totalGoldWeightPure += totalPureWeightLine;
          }
          if (def.metal === 'SILVER') {
            totalSilverValue += totalIntrinsicValue;
            totalSilverWeightPure += totalPureWeightLine;
          }
          totalAcquisitionCost += totalBuyCost;

          return {
            ...item,
            parsedQuantity: itemQuantity,
            def,
            pureMetalWeight,
            intrinsicValuePerCoin,
            totalIntrinsicValue,
            totalBuyCost,
            latentLineCapitalGain,
            lineRoiPercentage
          };
        }).filter(Boolean);

        const totalPortfolioValue = totalGoldValue + totalSilverValue;
        const latentCapitalGain = totalPortfolioValue - totalAcquisitionCost;
        const roiPercentage = totalAcquisitionCost > 0 ? (latentCapitalGain / totalAcquisitionCost) * 100 : 0;

        return {
          detailedAssets,
          totalGoldValue,
          totalSilverValue,
          totalGoldWeightPure,
          totalSilverWeightPure,
          totalPortfolioValue,
          totalAcquisitionCost,
          latentCapitalGain,
          roiPercentage
        };
      }, [portfolio, spotPriceGram, fullDictionary]);

      // ==========================================
      // 4. GENERATEUR PDF ELEGANT (jsPDF)
      // ==========================================

      const handleGeneratePDF = () => {
        try {
          if (!window.jspdf || !window.jspdf.jsPDF) {
            alert("Erreur: Les librairies PDF ne sont pas encore chargées. Vérifiez votre connexion.");
            return;
          }

          const { jsPDF } = window.jspdf;
          // Document A4 portrait
          const doc = new jsPDF();
          
          // Architect Rule: Sanitizer pour contrer le bug V8 du "Narrow No-Break Space" (\u202F)
          // qui provoque l'affichage de "1/000,00" dans la police Helvetica standard du PDF.
          const formatPDFCurrency = (val) => {
            const formatted = new Intl.NumberFormat('fr-FR', { 
              minimumFractionDigits: 2, 
              maximumFractionDigits: 2 
            }).format(val);
            // Écrase les espaces insécables bizarres par des espaces purs, et ajoute l'Euro
            return formatted.replace(/[\u202F\u00A0]/g, ' ') + ' €';
          };

          const formatPDFWeight = (val) => {
            return new Intl.NumberFormat('fr-FR', { 
              minimumFractionDigits: 2, 
              maximumFractionDigits: 2 
            }).format(val).replace(/[\u202F\u00A0]/g, ' ');
          };
          
          const primaryColor = [15, 23, 42]; // Slate 950
          const accentColor = [56, 189, 248]; // Sky 400
          
          // --- HEADER (Fond Sombre Élégant) ---
          doc.setFillColor(...primaryColor);
          doc.rect(0, 0, 210, 45, 'F');
          
          doc.setFont("helvetica", "bold");
          doc.setFontSize(24);
          doc.setTextColor(255, 255, 255);
          doc.text("AUDIT NUMISMATIQUE", 14, 24);
          
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.setTextColor(148, 163, 184); // Slate 400
          const dateStr = new Date().toLocaleString('fr-FR');
          doc.text(`Généré le : ${dateStr}`, 14, 34);
          
          doc.setTextColor(...accentColor);
          doc.text(`Oracle Spot : OR = ${formatPDFCurrency(spotPricesOz.GOLD)}/oz  |  ARGENT = ${formatPDFCurrency(spotPricesOz.SILVER)}/oz`, 14, 40);

          // --- KPIs (Cartes visuelles) ---
          let startY = 55;
          
          // Boite 1 : Bilan Financier
          doc.setDrawColor(203, 213, 225); // Slate 300
          doc.setFillColor(248, 250, 252); // Slate 50
          doc.roundedRect(14, startY, 85, 35, 3, 3, 'FD');
          
          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          doc.setTextColor(...primaryColor);
          doc.text("BILAN FINANCIER", 18, startY + 8);
          
          doc.setFontSize(16);
          doc.text(formatPDFCurrency(portfolioStats.totalPortfolioValue), 18, startY + 16);
          
          doc.setFont("helvetica", "normal");
          doc.setFontSize(9);
          doc.setTextColor(71, 85, 105);
          doc.text(`Coût d'Acquisition : ${formatPDFCurrency(portfolioStats.totalAcquisitionCost)}`, 18, startY + 24);
          
          const isPositive = portfolioStats.latentCapitalGain >= 0;
          doc.setFont("helvetica", "bold");
          doc.setTextColor(isPositive ? 5 : 220, isPositive ? 150 : 38, isPositive ? 105 : 38); 
          const sign = isPositive ? '+' : '';
          doc.text(`Plus-value : ${sign}${formatPDFCurrency(portfolioStats.latentCapitalGain)} (${sign}${portfolioStats.roiPercentage.toFixed(2)}%)`, 18, startY + 30);

          // Boite 2 : Masses
          doc.setDrawColor(203, 213, 225);
          doc.setFillColor(248, 250, 252);
          doc.roundedRect(110, startY, 85, 35, 3, 3, 'FD');
          
          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          doc.setTextColor(...primaryColor);
          doc.text("MASSES PURES (EN STOCK)", 114, startY + 8);
          
          doc.setFontSize(10);
          doc.setTextColor(180, 83, 9); // Amber 700 (Or)
          doc.text(`OR : ${formatPDFWeight(portfolioStats.totalGoldWeightPure)} g`, 114, startY + 16);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(8);
          doc.setTextColor(100, 116, 139);
          doc.text(`Équivalent : ${formatPDFWeight(portfolioStats.totalGoldWeightPure / TROY_OUNCE_GRAMS)} oz`, 114, startY + 20);

          doc.setFont("helvetica", "bold");
          doc.setFontSize(10);
          doc.setTextColor(71, 85, 105); // Slate 600 (Argent)
          doc.text(`ARGENT : ${formatPDFWeight(portfolioStats.totalSilverWeightPure / 1000)} kg`, 114, startY + 27);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(8);
          doc.setTextColor(100, 116, 139);
          doc.text(`Équivalent : ${formatPDFWeight(portfolioStats.totalSilverWeightPure / TROY_OUNCE_GRAMS)} oz`, 114, startY + 31);

          // --- DATA TABLE ---
          const activeAssets = portfolioStats.detailedAssets.filter(item => item.parsedQuantity > 0);
          
          const tableData = activeAssets.map(item => [
            item.def.name + (customDictionary[item.coinId] ? " (*)" : ""),
            item.parsedQuantity.toString(),
            formatPDFCurrency(parseFloat(item.avgBuyPrice) || 0),
            formatPDFCurrency(item.intrinsicValuePerCoin),
            formatPDFCurrency(item.totalIntrinsicValue),
            `${item.latentLineCapitalGain >= 0 ? '+' : ''}${formatPDFCurrency(item.latentLineCapitalGain)}\n(${item.latentLineCapitalGain >= 0 ? '+' : ''}${item.lineRoiPercentage.toFixed(1)}%)`
          ]);

          doc.autoTable({
            startY: 100,
            head: [['Actif (Métal)', 'Qte', 'PRU Moyen', 'Valeur Fonte', 'Valorisation', 'Performance']],
            body: tableData,
            theme: 'striped',
            headStyles: { 
              fillColor: primaryColor, 
              textColor: 255, 
              fontStyle: 'bold',
              halign: 'center'
            },
            styles: { 
              fontSize: 9, 
              cellPadding: 4, 
              font: "helvetica",
              textColor: [51, 65, 85] // Slate 700
            },
            alternateRowStyles: { fillColor: [248, 250, 252] },
            columnStyles: {
              0: { halign: 'left', fontStyle: 'bold' },
              1: { halign: 'center' },
              // Architect Rule: L'alignement à droite avec un formatage strict (X XX,00 €) force l'alignement visuel parfait sur la virgule.
              2: { halign: 'right' },
              3: { halign: 'right' },
              4: { halign: 'right', fontStyle: 'bold', textColor: [15, 23, 42] },
              5: { halign: 'right', fontStyle: 'bold' }
            },
            didParseCell: function(data) {
               // Coloration conditionnelle pour la colonne Performance
               if (data.section === 'body' && data.column.index === 5) {
                  const valStr = data.cell.raw;
                  if (valStr.includes('+')) data.cell.styles.textColor = [5, 150, 105]; // Vert positif
                  if (valStr.includes('-')) data.cell.styles.textColor = [220, 38, 38]; // Rouge négatif
               }
            }
          });

          // Footer
          const finalY = doc.lastAutoTable.finalY || 100;
          if (Object.keys(customDictionary).length > 0) {
             doc.setFontSize(8);
             doc.setTextColor(148, 163, 184);
             doc.text("(*) Actifs sur-mesure créés localement.", 14, finalY + 10);
          }

          const pageCount = doc.internal.getNumberOfPages();
          for(let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            doc.setFontSize(8);
            doc.setTextColor(148, 163, 184);
            doc.text(`Engine Numismatique V2 - Page ${i} sur ${pageCount}`, 14, doc.internal.pageSize.height - 10);
          }

          // Déclenche le téléchargement
          doc.save(`Audit_Numismatique_${new Date().toISOString().split('T')[0]}.pdf`);
        } catch(err) {
          console.error(err);
          alert("Erreur lors de la génération du PDF.");
        }
      };

      // ==========================================
      // 5. I/O MANAGER (JSON Export/Import V2)
      // ==========================================
      
      const handleExportJSON = () => {
        try {
          const payload = { version: "2.0", portfolio, customDictionary, spotPricesOz };
          const dataStr = JSON.stringify(payload, null, 2);
          const blob = new Blob([dataStr], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `numismatic_backup_v2_${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (error) {
          console.error("Échec de l'export JSON.", error);
        }
      };

      const handleImportJSON = (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const parsed = JSON.parse(e.target?.result);
            if (Array.isArray(parsed)) {
              if (!parsed.every(isValidPortfolioItem)) throw new Error("Format V1 corrompu.");
              setPortfolio(parsed);
              alert("✅ Portfolio V1 restauré.");
            } else if (parsed.version === "2.0") {
              if (!Array.isArray(parsed.portfolio)) throw new Error("Portfolio manquant dans la V2.");
              setPortfolio(parsed.portfolio);
              if (parsed.customDictionary) setCustomDictionary(parsed.customDictionary);
              if (parsed.spotPricesOz) setSpotPricesOz(parsed.spotPricesOz);
              alert("✅ Base de données V2.0 restaurée (Portfolio + Dictionnaire + Spots).");
            } else {
              throw new Error("Structure de fichier JSON non reconnue.");
            }
          } catch (error) {
            console.error(error);
            alert(`❌ Échec de la restauration : ${error.message}`);
          } finally {
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        reader.readAsText(file);
      };

      const handleReset = () => {
        if (window.confirm("⚠️ Voulez-vous vraiment purger les données ? (Le dictionnaire sur-mesure sera également effacé)")) {
          setCustomDictionary({});
          setPortfolio([...DEFAULT_PORTFOLIO]);
        }
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-200 font-sans p-6 selection:bg-blue-900">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* --- HEADER --- */}
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-4">
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <ShieldCheck className="text-emerald-500" />
                  Engine Numismatique V2
                </h1>
                <p className="text-slate-400 text-sm mt-1">Modèle de données Extensible. Offline ready.</p>
              </div>
              <div className="mt-4 md:mt-0 flex flex-wrap gap-3">
                <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleImportJSON} />
                
                {/* Nouveau Bouton PDF */}
                <button onClick={handleGeneratePDF} className="flex items-center gap-2 px-3 py-2 bg-indigo-900/50 hover:bg-indigo-800 text-indigo-300 border border-indigo-800 rounded-md text-sm font-semibold transition-all shadow-lg" title="Générer un rapport d'audit au format PDF">
                  <FileText size={16} /> Générer PDF
                </button>

                <div className="w-px h-8 bg-slate-800 mx-1 hidden md:block"></div>

                <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-md text-sm font-semibold transition-all">
                  <Upload size={16} /> Import
                </button>
                <button onClick={handleExportJSON} className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-md text-sm font-semibold transition-all">
                  <Download size={16} /> Export (V2)
                </button>
                <div className="w-px h-8 bg-slate-800 mx-1 hidden md:block"></div>
                <button onClick={handleReset} className="flex items-center gap-2 px-3 py-2 bg-slate-900 hover:bg-red-900/50 text-slate-400 hover:text-red-400 border border-slate-800 hover:border-red-900/50 rounded-md text-sm font-semibold transition-all">
                  <Trash2 size={16} /> Reset
                </button>
              </div>
            </div>

            {/* --- SPOT PRICES --- */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {['GOLD', 'SILVER'].map((metal) => (
                <div key={metal} className="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col shadow-lg">
                  <div className="text-sm font-medium mb-3 flex items-center justify-between text-slate-400">
                    <div className="flex items-center gap-2">
                      <LineChart size={16} className={metal === 'GOLD' ? 'text-yellow-500' : 'text-slate-300'} />
                      Cours Spot {metal === 'GOLD' ? 'OR' : 'ARGENT'}
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2 text-center divide-x divide-slate-800 items-center">
                    <div>
                      <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Gramme</div>
                      <div className={`text-sm font-bold ${metal === 'GOLD' ? 'text-yellow-500' : 'text-slate-300'}`}>
                        {formatCurrency(spotPriceGram[metal])}
                      </div>
                    </div>
                    <div className="px-2">
                      <div className="text-xs text-blue-400 uppercase tracking-wider mb-1 flex justify-center items-center gap-1">
                        Once (oz) <Edit3 size={10} />
                      </div>
                      <div className="flex justify-center items-center">
                        <input 
                          type="number" min="0" step="any"
                          value={spotPricesOz[metal]}
                          onChange={(e) => updateSpotOz(metal, e.target.value)}
                          className="w-full max-w-[100px] text-center bg-slate-950 border border-blue-900/50 rounded px-1 py-1 text-lg font-bold focus:outline-none focus:border-blue-500 text-white"
                        />
                      </div>
                    </div>
                    <div>
                      <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Kilo (kg)</div>
                      <div className={`text-sm font-bold ${metal === 'GOLD' ? 'text-yellow-500' : 'text-slate-300'}`}>
                        {formatCurrency(spotPriceGram[metal] * 1000)}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* --- KPIs --- */}
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                <div className="text-slate-500 text-sm font-medium mb-1 flex items-center gap-2"><Coins size={16}/> Valeur Intrinsèque Totale</div>
                <div className="text-3xl font-black text-white">{formatCurrency(portfolioStats.totalPortfolioValue)}</div>
              </div>
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                <div>
                  <div className="text-yellow-600 text-sm font-medium mb-1">Total Or Pur (Spot)</div>
                  <div className="text-2xl font-bold text-yellow-500">{formatCurrency(portfolioStats.totalGoldValue)}</div>
                </div>
                <div className="mt-2 pt-2 border-t border-slate-800/50 text-xs text-yellow-600/80 font-mono flex flex-wrap gap-x-3 gap-y-1">
                  <span>{portfolioStats.totalGoldWeightPure.toFixed(2)}g</span>
                  <span>{(portfolioStats.totalGoldWeightPure / TROY_OUNCE_GRAMS).toFixed(2)} oz</span>
                </div>
              </div>
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                <div>
                  <div className="text-slate-400 text-sm font-medium mb-1">Total Argent Pur (Spot)</div>
                  <div className="text-2xl font-bold text-slate-300">{formatCurrency(portfolioStats.totalSilverValue)}</div>
                </div>
                <div className="mt-2 pt-2 border-t border-slate-800/50 text-xs text-slate-500 font-mono flex flex-wrap gap-x-3 gap-y-1">
                  <span>{(portfolioStats.totalSilverWeightPure / 1000).toFixed(2)} kg</span>
                  <span>{(portfolioStats.totalSilverWeightPure / TROY_OUNCE_GRAMS).toFixed(2)} oz</span>
                </div>
              </div>
              <div className={`border rounded-xl p-5 shadow-lg flex flex-col justify-center ${portfolioStats.latentCapitalGain >= 0 ? 'bg-emerald-950/30 border-emerald-900' : 'bg-red-950/30 border-red-900'}`}>
                <div className="text-slate-400 text-sm font-medium mb-1 flex items-center gap-2">
                   <TrendingUp size={16} className={portfolioStats.latentCapitalGain >= 0 ? 'text-emerald-500' : 'text-red-500'} /> 
                   Plus-value Latente
                </div>
                <div className={`text-2xl font-bold ${portfolioStats.latentCapitalGain >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                  {portfolioStats.latentCapitalGain > 0 ? '+' : ''}{formatCurrency(portfolioStats.latentCapitalGain)}
                </div>
                <div className={`text-xs mt-1 ${portfolioStats.latentCapitalGain >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                  ROI: {portfolioStats.roiPercentage.toFixed(2)}%
                </div>
              </div>
            </div>

            {/* --- ASSET MANAGER TOOLBAR --- */}
            <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-lg">
              <div className="flex flex-col md:flex-row gap-4 items-center justify-between">
                
                {/* Add from Dictionary */}
                <div className="flex w-full md:w-auto gap-2 items-center">
                  <select 
                    value={selectedAssetToAdd} 
                    onChange={(e) => setSelectedAssetToAdd(e.target.value)}
                    className="flex-1 md:w-64 bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-blue-500"
                  >
                    <option value="">Sélectionner un actif à ajouter...</option>
                    {availableAssets.map(def => (
                      <option key={def.id} value={def.id}>{def.name} ({def.metal})</option>
                    ))}
                  </select>
                  <button 
                    onClick={addExistingAsset}
                    disabled={!selectedAssetToAdd}
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 disabled:text-slate-500 text-white rounded-md text-sm font-semibold transition-all flex items-center gap-1"
                  >
                    <Plus size={16} /> Ajouter
                  </button>
                </div>

                <div className="w-full md:w-px h-px md:h-8 bg-slate-800"></div>

                {/* Create Custom Asset Toggle */}
                <button 
                  onClick={() => setShowCustomForm(!showCustomForm)}
                  className={`px-4 py-2 w-full md:w-auto rounded-md text-sm font-semibold transition-all flex justify-center items-center gap-2 border ${showCustomForm ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-950 border-emerald-900/50 text-emerald-500 hover:bg-emerald-900/20'}`}
                >
                  {showCustomForm ? <><X size={16} /> Fermer</> : <><Edit3 size={16} /> Créer un actif sur-mesure</>}
                </button>
              </div>

              {/* Custom Asset Form */}
              {showCustomForm && (
                <form onSubmit={handleCreateCustomAsset} className="mt-4 p-4 border-t border-slate-800 bg-slate-950/50 rounded-b-lg flex flex-col md:flex-row gap-3">
                  <input 
                    required type="text" placeholder="Nom (ex: Krugerrand 1oz)" 
                    value={customAssetForm.name} onChange={e => setCustomAssetForm({...customAssetForm, name: e.target.value})}
                    className="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200"
                  />
                  <select 
                    value={customAssetForm.metal} onChange={e => setCustomAssetForm({...customAssetForm, metal: e.target.value})}
                    className="w-full md:w-32 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200"
                  >
                    <option value="GOLD">Or</option>
                    <option value="SILVER">Argent</option>
                  </select>
                  <input 
                    required type="number" step="any" min="0" placeholder="Poids brut (g)" 
                    value={customAssetForm.grossWeight} onChange={e => setCustomAssetForm({...customAssetForm, grossWeight: e.target.value})}
                    className="w-full md:w-36 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200"
                  />
                  <input 
                    required type="number" step="any" min="0" max="1" placeholder="Titre (ex: 0.900)" 
                    value={customAssetForm.purity} onChange={e => setCustomAssetForm({...customAssetForm, purity: e.target.value})}
                    className="w-full md:w-36 bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm text-slate-200"
                  />
                  <button type="submit" className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-md text-sm font-semibold transition-all">
                    Sauvegarder
                  </button>
                </form>
              )}
            </div>

            {/* --- DATA TABLE --- */}
            <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm whitespace-nowrap">
                  <thead className="bg-slate-950 border-b border-slate-800 text-slate-400">
                    <tr>
                      <th className="p-4 font-semibold">Actif (Métal)</th>
                      <th className="p-4 font-semibold">Quantité</th>
                      <th className="p-4 font-semibold">PRU Moyen</th>
                      <th className="p-4 font-semibold text-right">Poids Pur U.</th>
                      <th className="p-4 font-semibold text-right">Valeur Fonte U.</th>
                      <th className="p-4 font-semibold text-right">Valorisation</th>
                      <th className="p-4 font-semibold text-right">Performance</th>
                      <th className="p-4 font-semibold text-center w-12">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-800/50">
                    {portfolioStats.detailedAssets.length === 0 ? (
                      <tr><td colSpan="8" className="p-8 text-center text-slate-500">Aucun actif dans le portefeuille. Utilisez le panneau ci-dessus pour en ajouter.</td></tr>
                    ) : portfolioStats.detailedAssets.map((item, idx) => (
                      <tr key={`${item.coinId}-${idx}`} className="hover:bg-slate-800/50 transition-colors">
                        <td className="p-4">
                          <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${item.def.metal === 'GOLD' ? 'bg-yellow-500' : 'bg-slate-400'}`}></div>
                            <span className="font-medium text-slate-200">{item.def.name}</span>
                            {customDictionary[item.coinId] && <span className="px-1.5 py-0.5 rounded text-[10px] bg-indigo-900/50 text-indigo-300 border border-indigo-800">Custom</span>}
                          </div>
                        </td>
                        <td className="p-4">
                          <input 
                            type="number" min="0" step="any" value={item.quantity}
                            onChange={(e) => updateAsset(item.coinId, 'quantity', e.target.value)}
                            className="w-20 bg-slate-950 border border-slate-700 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 font-mono"
                          />
                        </td>
                        <td className="p-4">
                           <div className="flex items-center gap-1">
                            <input 
                              type="number" min="0" step="any" value={item.avgBuyPrice || ''}
                              onChange={(e) => updateAsset(item.coinId, 'avgBuyPrice', e.target.value)}
                              className="w-24 bg-slate-950 border border-slate-700 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 font-mono"
                            />
                            <span className="text-slate-500">€</span>
                          </div>
                        </td>
                        <td className="p-4 text-right text-slate-400 flex justify-end items-center gap-1">
                          {item.pureMetalWeight.toFixed(3)}g <Scale size={14} className="opacity-50"/>
                        </td>
                        <td className="p-4 text-right text-slate-300 font-mono">{formatCurrency(item.intrinsicValuePerCoin)}</td>
                        <td className="p-4 text-right font-semibold text-white">{formatCurrency(item.totalIntrinsicValue)}</td>
                        <td className="p-4 text-right">
                          <div className={`font-bold ${item.latentLineCapitalGain >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                            {item.latentLineCapitalGain > 0 ? '+' : ''}{formatCurrency(item.latentLineCapitalGain)}
                          </div>
                          <div className={`text-xs ${item.lineRoiPercentage >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                            {item.lineRoiPercentage > 0 ? '+' : ''}{item.lineRoiPercentage.toFixed(1)}%
                          </div>
                        </td>
                        <td className="p-4 text-center">
                          <button 
                            onClick={() => removeAsset(item.coinId)}
                            className="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-500/10 rounded transition-colors"
                            title="Retirer l'actif du portefeuille"
                          >
                            <Trash2 size={16} />
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
