<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engine Numismatique (Standalone)</title>
  
  <!-- Architect Dependencies: CDN React, ReactDOM, Babel & Tailwind -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950">
  <div id="root"></div>

  <!-- Architect Engine: Application React embarquée (Pur JS/JSX pour une stabilité V8 maximale) -->
  <script type="text/babel" data-presets="react">
    const { useMemo, useState, useEffect, useRef } = React;

    // ==========================================
    // 0. ZERO-DEPENDENCY ICONS (SVG Purs)
    // ==========================================
    const ShieldCheck = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
    const Coins = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>;
    const TrendingUp = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const Scale = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
    const LineChart = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
    const Trash2 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Download = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Upload = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const Printer = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Edit3 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;

    // ==========================================
    // 1. DATA LAYER (Normalisé & Pur JS)
    // ==========================================

    const isValidPortfolioItem = (item) => {
      return (
        typeof item === 'object' &&
        item !== null &&
        typeof item.coinId === 'string' &&
        typeof item.quantity === 'number' &&
        (item.avgBuyPrice === undefined || typeof item.avgBuyPrice === 'number')
      );
    };

    const TROY_OUNCE_GRAMS = 31.1034768;

    const COIN_DICTIONARY = {
      'souverain': { id: 'souverain', name: 'Souverain', metal: 'GOLD', grossWeight: 7.988, purity: 0.917 },
      'coq_20f': { id: 'coq_20f', name: 'Coq 20 Francs', metal: 'GOLD', grossWeight: 6.45, purity: 0.900 },
      'hercule_50f': { id: 'hercule_50f', name: 'Hercule 50 Francs', metal: 'SILVER', grossWeight: 30.0, purity: 0.900 },
      'hercule_10f': { id: 'hercule_10f', name: 'Hercule 10 Francs', metal: 'SILVER', grossWeight: 25.0, purity: 0.900 },
      'liberty_10': { id: 'liberty_10', name: 'Liberty 10$', metal: 'GOLD', grossWeight: 16.718, purity: 0.900 },
      'liberty_20': { id: 'liberty_20', name: 'Liberty 20$', metal: 'GOLD', grossWeight: 33.436, purity: 0.900 },
      '10f_or': { id: '10f_or', name: '10 Francs Or', metal: 'GOLD', grossWeight: 3.225, purity: 0.900 },
      '40f_or': { id: '40f_or', name: '40 Francs Or', metal: 'GOLD', grossWeight: 12.90, purity: 0.900 },
      '50f_or': { id: '50f_or', name: '50 Francs Or', metal: 'GOLD', grossWeight: 16.12, purity: 0.900 },
    };

    const DEFAULT_PORTFOLIO = Object.keys(COIN_DICTIONARY).map(coinId => ({
      coinId,
      quantity: 0,
      avgBuyPrice: 0
    }));

    const STORAGE_KEY_PORTFOLIO = '@numismatic_engine/portfolio_v1';
    const STORAGE_KEY_SPOT = '@numismatic_engine/spot_v1';

    // ==========================================
    // 2. LOGIQUE METIER (Pure & Performante)
    // ==========================================

    function App() {
      const fileInputRef = useRef(null);
      
      // State 1 : Portefeuille
      const [portfolio, setPortfolio] = useState(() => {
        try {
          const cached = localStorage.getItem(STORAGE_KEY_PORTFOLIO);
          if (cached) {
            const parsed = JSON.parse(cached);
            if (Array.isArray(parsed) && parsed.every(isValidPortfolioItem)) return parsed;
          }
        } catch (error) {
          console.warn('[Architect Error]: LocalStorage corrompu. Fallback sur le state initial.', error);
        }
        return [...DEFAULT_PORTFOLIO];
      });

      // State 2 : Prix Spot (Saisis par l'utilisateur en Ounces)
      const [spotPricesOz, setSpotPricesOz] = useState(() => {
        try {
          const cached = localStorage.getItem(STORAGE_KEY_SPOT);
          if (cached) {
            const parsed = JSON.parse(cached);
            if (typeof parsed.GOLD === 'number' && typeof parsed.SILVER === 'number') return parsed;
          }
        } catch (error) {
          console.warn('[Architect Error]: Spot LocalStorage corrompu. Fallback par défaut.');
        }
        // Valeurs par défaut équivalentes à tes anciens prix (117€/g et 1.595€/g) ramenés à l'Once
        return { GOLD: 3639.10, SILVER: 49.61 };
      });

      // Synchronisation I/O (Sauvegarde asynchrone transparente)
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY_PORTFOLIO, JSON.stringify(portfolio));
        } catch (e) { console.error('Erreur sauvegarde portfolio:', e); }
      }, [portfolio]);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY_SPOT, JSON.stringify(spotPricesOz));
        } catch (e) { console.error('Erreur sauvegarde spot:', e); }
      }, [spotPricesOz]);

      // Calcul dérivés du gramme (O(1)) basé sur l'once
      const spotPriceGram = useMemo(() => ({
        GOLD: spotPricesOz.GOLD / TROY_OUNCE_GRAMS,
        SILVER: spotPricesOz.SILVER / TROY_OUNCE_GRAMS
      }), [spotPricesOz]);

      const updateAsset = (coinId, field, value) => {
        setPortfolio(prev => prev.map(item => 
          item.coinId === coinId ? { ...item, [field]: Math.max(0, value) } : item
        ));
      };

      const updateSpotOz = (metal, value) => {
        setSpotPricesOz(prev => ({ ...prev, [metal]: Math.max(0, value) }));
      };

      // ==========================================
      // 3. I/O MANAGER (JSON Export/Import)
      // ==========================================
      
      const handleExportJSON = () => {
        try {
          const dataStr = JSON.stringify(portfolio, null, 2);
          const blob = new Blob([dataStr], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = `numismatic_backup_${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (error) {
          console.error("[Architect Error]: Échec de l'export JSON.", error);
        }
      };

      const handleImportJSON = (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const content = e.target?.result;
            const parsed = JSON.parse(content);
            
            if (!Array.isArray(parsed)) throw new Error("Format invalide : Le fichier n'est pas un tableau (Array).");
            
            const isValid = parsed.every(isValidPortfolioItem);
            if (!isValid) throw new Error("Format invalide : La structure des objets ne correspond pas au typage attendu.");

            setPortfolio(parsed);
            alert("✅ Portfolio restauré avec succès à partir du JSON.");
          } catch (error) {
            console.error(error);
            alert(`❌ Échec de la restauration : ${error.message}`);
          } finally {
            if (fileInputRef.current) fileInputRef.current.value = '';
          }
        };
        
        reader.readAsText(file);
      };

      // ==========================================
      // 4. REPORT GENERATOR (Native Print Spooler)
      // ==========================================

      const handlePrintReport = () => {
        const printWindow = window.open('', '_blank');
        if (!printWindow) {
          alert("⚠️ [Architect Error] : Le navigateur a bloqué le popup d'impression. Autorisez les popups.");
          return;
        }

        const dateStr = new Date().toLocaleString('fr-FR');
        const activeAssets = portfolioStats.detailedAssets.filter(item => item.quantity > 0);

        const htmlContent = `
          <!DOCTYPE html>
          <html lang="fr">
          <head>
            <meta charset="UTF-8">
            <title>Audit Numismatique - ${dateStr}</title>
            <style>
              :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
              body { color: #0f172a; max-width: 900px; margin: 0 auto; padding: 2rem; }
              .header { border-bottom: 2px solid #0f172a; padding-bottom: 1rem; margin-bottom: 2rem; }
              h1 { margin: 0 0 0.5rem 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
              .meta { color: #64748b; font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.875rem; }
              
              .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
              .kpi-box { border: 1px solid #cbd5e1; padding: 1.5rem; border-radius: 0.5rem; background: #f8fafc; }
              .kpi-box h3 { margin-top: 0; color: #334155; font-size: 0.875rem; text-transform: uppercase; }
              .kpi-value { font-size: 1.5rem; font-weight: 700; margin: 0.5rem 0; }
              .kpi-sub { font-size: 0.875rem; color: #475569; }
              
              table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.875rem; }
              th, td { border-bottom: 1px solid #e2e8f0; padding: 0.75rem 0.5rem; text-align: left; }
              th { background-color: #f1f5f9; font-weight: 600; color: #334155; }
              .right { text-align: right; font-variant-numeric: tabular-nums; }
              
              .positive { color: #059669; }
              .negative { color: #dc2626; }
              
              @media print {
                body { padding: 0; max-width: 100%; }
                .no-print { display: none; }
                .kpi-box { border: 1px solid #000; }
              }
            </style>
          </head>
          <body>
            <div class="header">
              <h1>Rapport d'Audit Numismatique</h1>
              <div class="meta">Date de génération : ${dateStr}</div>
              <div class="meta">Base Spot Saisie : OR = ${formatCurrency(spotPricesOz.GOLD)}/oz | ARGENT = ${formatCurrency(spotPricesOz.SILVER)}/oz</div>
              <div class="meta no-print" style="margin-top: 1rem; color: #0284c7;">
                ℹ️ Utilisez les options d'impression pour "Enregistrer au format PDF".
              </div>
            </div>
            
            <div class="kpi-grid">
               <div class="kpi-box">
                 <h3>Bilan Financier</h3>
                 <div class="kpi-value">${formatCurrency(portfolioStats.totalPortfolioValue)}</div>
                 <div class="kpi-sub">
                   Coût d'acquisition : ${formatCurrency(portfolioStats.totalAcquisitionCost)}<br/>
                   Plus-value : <strong class="${portfolioStats.latentCapitalGain >= 0 ? 'positive' : 'negative'}">
                      ${portfolioStats.latentCapitalGain > 0 ? '+' : ''}${formatCurrency(portfolioStats.latentCapitalGain)} (${portfolioStats.roiPercentage.toFixed(2)}%)
                   </strong>
                 </div>
               </div>
               <div class="kpi-box">
                 <h3>Masses Pures (Standard)</h3>
                 <div class="kpi-value" style="color: #b45309;">OR : ${portfolioStats.totalGoldWeightPure.toFixed(2)} g</div>
                 <div class="kpi-sub" style="margin-bottom: 0.5rem;">Équivalent Troy : ${(portfolioStats.totalGoldWeightPure / TROY_OUNCE_GRAMS).toFixed(2)} oz</div>
                 <div class="kpi-value" style="color: #475569; font-size: 1.25rem;">ARGENT : ${(portfolioStats.totalSilverWeightPure / 1000).toFixed(2)} kg</div>
                 <div class="kpi-sub">Équivalent Troy : ${(portfolioStats.totalSilverWeightPure / TROY_OUNCE_GRAMS).toFixed(2)} oz</div>
               </div>
            </div>

            <table>
              <thead>
                <tr>
                  <th>Actif</th>
                  <th class="right">Quantité</th>
                  <th class="right">PRU Moyen</th>
                  <th class="right">Valeur Unitaire (Fonte)</th>
                  <th class="right">Valorisation Totale</th>
                  <th class="right">Performance</th>
                </tr>
              </thead>
              <tbody>
                ${activeAssets.length === 0 ? '<tr><td colspan="6" style="text-align:center; padding: 2rem;">Aucun actif en stock (Quantités à 0).</td></tr>' : ''}
                ${activeAssets.map(item => `
                  <tr>
                    <td><strong>${item.def.name}</strong></td>
                    <td class="right">${item.quantity}</td>
                    <td class="right">${formatCurrency(item.avgBuyPrice || 0)}</td>
                    <td class="right">${formatCurrency(item.intrinsicValuePerCoin)}</td>
                    <td class="right" style="font-weight:600;">${formatCurrency(item.totalIntrinsicValue)}</td>
                    <td class="right ${item.latentLineCapitalGain >= 0 ? 'positive' : 'negative'}">
                      ${item.latentLineCapitalGain > 0 ? '+' : ''}${formatCurrency(item.latentLineCapitalGain)}<br/>
                      <small>${item.lineRoiPercentage > 0 ? '+' : ''}${item.lineRoiPercentage.toFixed(1)}%</small>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
            
            <script>
              window.onload = () => { window.print(); }
            <\/script>
          </body>
          </html>
        `;

        printWindow.document.open();
        printWindow.document.write(htmlContent);
        printWindow.document.close();
      };

      // ==========================================
      // 5. ENGINE MATHÉMATIQUE (O(N) Memoized)
      // ==========================================

      const portfolioStats = useMemo(() => {
        let totalGoldValue = 0;
        let totalSilverValue = 0;
        let totalAcquisitionCost = 0;
        let totalGoldWeightPure = 0;
        let totalSilverWeightPure = 0;
        
        const detailedAssets = portfolio.map(item => {
          const def = COIN_DICTIONARY[item.coinId];
          if (!def) return null;

          const pureMetalWeight = def.grossWeight * def.purity;
          // Injection dynamique du gramme converti depuis l'once saisie
          const spotPrice = spotPriceGram[def.metal];
          
          const intrinsicValuePerCoin = pureMetalWeight * spotPrice;
          const totalIntrinsicValue = intrinsicValuePerCoin * item.quantity;
          const totalBuyCost = (item.avgBuyPrice || 0) * item.quantity;
          const totalPureWeightLine = pureMetalWeight * item.quantity;

          const latentLineCapitalGain = totalIntrinsicValue - totalBuyCost;
          const lineRoiPercentage = totalBuyCost > 0 ? (latentLineCapitalGain / totalBuyCost) * 100 : 0;

          if (def.metal === 'GOLD') {
            totalGoldValue += totalIntrinsicValue;
            totalGoldWeightPure += totalPureWeightLine;
          }
          if (def.metal === 'SILVER') {
            totalSilverValue += totalIntrinsicValue;
            totalSilverWeightPure += totalPureWeightLine;
          }
          totalAcquisitionCost += totalBuyCost;

          return {
            ...item,
            def,
            pureMetalWeight,
            intrinsicValuePerCoin,
            totalIntrinsicValue,
            totalBuyCost,
            latentLineCapitalGain,
            lineRoiPercentage
          };
        }).filter(Boolean);

        const totalPortfolioValue = totalGoldValue + totalSilverValue;
        const latentCapitalGain = totalPortfolioValue - totalAcquisitionCost;
        const roiPercentage = totalAcquisitionCost > 0 ? (latentCapitalGain / totalAcquisitionCost) * 100 : 0;

        return {
          detailedAssets,
          totalGoldValue,
          totalSilverValue,
          totalGoldWeightPure,
          totalSilverWeightPure,
          totalPortfolioValue,
          totalAcquisitionCost,
          latentCapitalGain,
          roiPercentage
        };
      }, [portfolio, spotPriceGram]);

      const handleReset = () => {
        if (window.confirm("⚠️ [Architect Warning] : Voulez-vous vraiment purger les données et revenir à zéro ?")) {
          setPortfolio([...DEFAULT_PORTFOLIO]);
        }
      };

      const formatCurrency = (val) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(val);

      return (
        <div className="min-h-screen bg-slate-950 text-slate-200 font-sans p-6 selection:bg-blue-900">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* Header Dashboard */}
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-slate-800 pb-4">
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  <ShieldCheck className="text-emerald-500" />
                  Engine Numismatique (Air-Gapped)
                </h1>
                <p className="text-slate-400 text-sm mt-1">Souveraineté des données. Offline ready. Oracle Manuel.</p>
              </div>
              <div className="mt-4 md:mt-0 flex flex-wrap gap-3">
                
                <input 
                  type="file" 
                  accept=".json" 
                  className="hidden" 
                  ref={fileInputRef}
                  onChange={handleImportJSON}
                />

                <button 
                  onClick={handlePrintReport}
                  className="flex items-center gap-2 px-3 py-2 bg-indigo-900/50 hover:bg-indigo-800 text-indigo-300 border border-indigo-800 rounded-md text-sm font-semibold transition-all"
                  title="Générer un rapport d'audit (Impression/PDF)"
                >
                  <Printer size={16} />
                  Rapport
                </button>

                <button 
                  onClick={() => fileInputRef.current?.click()}
                  className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-md text-sm font-semibold transition-all"
                  title="Restaurer une sauvegarde JSON"
                >
                  <Upload size={16} />
                  Import
                </button>

                <button 
                  onClick={handleExportJSON}
                  className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-md text-sm font-semibold transition-all"
                  title="Sauvegarder l'état actuel en JSON"
                >
                  <Download size={16} />
                  Export
                </button>

                <div className="w-px h-8 bg-slate-800 mx-1 hidden md:block"></div>

                <button 
                  onClick={handleReset}
                  className="flex items-center gap-2 px-3 py-2 bg-slate-900 hover:bg-red-900/50 text-slate-400 hover:text-red-400 border border-slate-800 hover:border-red-900/50 rounded-md text-sm font-semibold transition-all"
                  title="Factory Reset"
                >
                  <Trash2 size={16} />
                </button>
              </div>
            </div>

            {/* Dashboard Spot Prices (Interactive) */}
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {['GOLD', 'SILVER'].map((metal) => (
                <div key={metal} className="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col shadow-lg">
                  <div className="text-sm font-medium mb-3 flex items-center justify-between text-slate-400">
                    <div className="flex items-center gap-2">
                      <LineChart size={16} className={metal === 'GOLD' ? 'text-yellow-500' : 'text-slate-300'} />
                      Cours Spot {metal === 'GOLD' ? 'OR' : 'ARGENT'} (Oracle Manuel)
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2 text-center divide-x divide-slate-800 items-center">
                    <div>
                      <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Gramme</div>
                      <div className={`text-sm font-bold ${metal === 'GOLD' ? 'text-yellow-500' : 'text-slate-300'}`}>
                        {formatCurrency(spotPriceGram[metal])}
                      </div>
                    </div>
                    
                    {/* The Source of Truth: Editable Ounce */}
                    <div className="px-2">
                      <div className="text-xs text-blue-400 uppercase tracking-wider mb-1 flex justify-center items-center gap-1">
                        Once (oz) <Edit3 size={10} />
                      </div>
                      <div className="flex justify-center items-center">
                        <input 
                          type="number" 
                          min="0"
                          step="0.01"
                          value={spotPricesOz[metal]}
                          onChange={(e) => updateSpotOz(metal, parseFloat(e.target.value) || 0)}
                          className="w-full max-w-[100px] text-center bg-slate-950 border border-blue-900/50 rounded px-1 py-1 text-lg font-bold focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-white"
                        />
                      </div>
                    </div>

                    <div>
                      <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Kilo (kg)</div>
                      <div className={`text-sm font-bold ${metal === 'GOLD' ? 'text-yellow-500' : 'text-slate-300'}`}>
                        {formatCurrency(spotPriceGram[metal] * 1000)}
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* KPIs Section */}
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-center">
                <div className="text-slate-500 text-sm font-medium mb-1 flex items-center gap-2"><Coins size={16}/> Valeur Intrinsèque Totale</div>
                <div className="text-3xl font-black text-white">{formatCurrency(portfolioStats.totalPortfolioValue)}</div>
              </div>
              
              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                <div>
                  <div className="text-yellow-600 text-sm font-medium mb-1">Total Or Pur (Spot)</div>
                  <div className="text-2xl font-bold text-yellow-500">{formatCurrency(portfolioStats.totalGoldValue)}</div>
                </div>
                <div className="mt-2 pt-2 border-t border-slate-800/50 text-xs text-yellow-600/80 font-mono flex flex-wrap gap-x-3 gap-y-1">
                  <span>{portfolioStats.totalGoldWeightPure.toFixed(2)}g</span>
                  <span>{(portfolioStats.totalGoldWeightPure / TROY_OUNCE_GRAMS).toFixed(2)} oz</span>
                </div>
              </div>

              <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 shadow-lg flex flex-col justify-between">
                <div>
                  <div className="text-slate-400 text-sm font-medium mb-1">Total Argent Pur (Spot)</div>
                  <div className="text-2xl font-bold text-slate-300">{formatCurrency(portfolioStats.totalSilverValue)}</div>
                </div>
                <div className="mt-2 pt-2 border-t border-slate-800/50 text-xs text-slate-500 font-mono flex flex-wrap gap-x-3 gap-y-1">
                  <span>{(portfolioStats.totalSilverWeightPure / 1000).toFixed(2)} kg</span>
                  <span>{(portfolioStats.totalSilverWeightPure / TROY_OUNCE_GRAMS).toFixed(2)} oz</span>
                </div>
              </div>

              <div className={`border rounded-xl p-5 shadow-lg flex flex-col justify-center ${portfolioStats.latentCapitalGain >= 0 ? 'bg-emerald-950/30 border-emerald-900' : 'bg-red-950/30 border-red-900'}`}>
                <div className="text-slate-400 text-sm font-medium mb-1 flex items-center gap-2">
                   <TrendingUp size={16} className={portfolioStats.latentCapitalGain >= 0 ? 'text-emerald-500' : 'text-red-500'} /> 
                   Plus-value Latente
                </div>
                <div className={`text-2xl font-bold ${portfolioStats.latentCapitalGain >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                  {portfolioStats.latentCapitalGain > 0 ? '+' : ''}{formatCurrency(portfolioStats.latentCapitalGain)}
                </div>
                <div className={`text-xs mt-1 ${portfolioStats.latentCapitalGain >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                  ROI: {portfolioStats.roiPercentage.toFixed(2)}%
                </div>
              </div>
            </div>

            {/* Table de données optimisée */}
            <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm whitespace-nowrap">
                  <thead className="bg-slate-950 border-b border-slate-800 text-slate-400">
                    <tr>
                      <th className="p-4 font-semibold">Actif (Métal)</th>
                      <th className="p-4 font-semibold">Quantité</th>
                      <th className="p-4 font-semibold">Prix d'Achat Moyen</th>
                      <th className="p-4 font-semibold text-right">Poids Pur U.</th>
                      <th className="p-4 font-semibold text-right">Valeur Fonte U.</th>
                      <th className="p-4 font-semibold text-right">Valeur Totale Fonte</th>
                      <th className="p-4 font-semibold text-right">Performance Ligne</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-800/50">
                    {portfolioStats.detailedAssets.map((item, idx) => (
                      <tr key={`${item.coinId}-${idx}`} className="hover:bg-slate-800/50 transition-colors">
                        <td className="p-4">
                          <div className="flex items-center gap-2">
                            <div className={`w-2 h-2 rounded-full ${item.def.metal === 'GOLD' ? 'bg-yellow-500' : 'bg-slate-400'}`}></div>
                            <span className="font-medium text-slate-200">{item.def.name}</span>
                          </div>
                        </td>
                        <td className="p-4">
                          <input 
                            type="number" 
                            min="0"
                            value={item.quantity}
                            onChange={(e) => updateAsset(item.coinId, 'quantity', parseFloat(e.target.value) || 0)}
                            className="w-20 bg-slate-950 border border-slate-700 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono"
                          />
                        </td>
                        <td className="p-4">
                           <div className="flex items-center gap-1">
                            <input 
                              type="number" 
                              min="0"
                              step="0.01"
                              value={item.avgBuyPrice || 0}
                              onChange={(e) => updateAsset(item.coinId, 'avgBuyPrice', parseFloat(e.target.value) || 0)}
                              className="w-24 bg-slate-950 border border-slate-700 rounded px-2 py-1 text-slate-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono"
                            />
                            <span className="text-slate-500">€</span>
                          </div>
                        </td>
                        <td className="p-4 text-right text-slate-400 flex justify-end items-center gap-1">
                          {item.pureMetalWeight.toFixed(3)}g <Scale size={14} className="opacity-50"/>
                        </td>
                        <td className="p-4 text-right text-slate-300 font-mono">{formatCurrency(item.intrinsicValuePerCoin)}</td>
                        <td className="p-4 text-right font-semibold text-white">{formatCurrency(item.totalIntrinsicValue)}</td>
                        <td className="p-4 text-right">
                          <div className={`font-bold ${item.latentLineCapitalGain >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                            {item.latentLineCapitalGain > 0 ? '+' : ''}{formatCurrency(item.latentLineCapitalGain)}
                          </div>
                          <div className={`text-xs ${item.lineRoiPercentage >= 0 ? 'text-emerald-500' : 'text-red-500'}`}>
                            {item.lineRoiPercentage > 0 ? '+' : ''}{item.lineRoiPercentage.toFixed(1)}%
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // Montage au DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
